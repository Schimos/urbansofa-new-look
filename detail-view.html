<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 40 40%27%3E%3Ccircle cx=%2720%27 cy=%2720%27 r=%2718%27 fill=%27%231a1a1a%27 stroke=%27%23c9a860%27 stroke-width=%273%27/%3E%3Ctext x=%2720%27 y=%2726%27 text-anchor=%27middle%27 font-family=%27Georgia,serif%27 font-weight=%27700%27 font-size=%2715%27 fill=%27%23ffffff%27%3EUS%3C/text%3E%3C/svg%3E">
<title>UrbanSofa &mdash; Order / Quote View</title>
<style>
  :root{
    --sidebar-bg:#f0ebe3;
    --sidebar-active-bg:#c6b8a1;
    --sidebar-border:#e6e1d5;
    --green:#597671;
    --green-dark:#46615c;
    --green-pale-bg:#e4eae9;
    --tan:#b08a3e;
    --tan-pale-bg:#f2e9d3;
    --tan-line:#c9a860;
    --red:#e2544c;
    --yellow-badge:#eab445;
    --border:#e3e0d8;
    --border-dashed:#d8cba0;
    --text-dark:#293224;
    --text-muted:#738297;
    --text-light-muted:#a1b1c7;
    --bg-page:#ffffff;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:'Source Sans Pro',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text-dark);
    background:var(--bg-page);
    font-size:14px;
    line-height:1.43;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;}
  .app{
    display:flex;
    height:100vh;
    width:100%;
    position:relative;
    overflow:hidden;
  }

  /* ---------------- Sidebar ---------------- */
  .sidebar{
    width:250px;
    flex:0 0 250px;
    background:var(--sidebar-bg);
    border-right:1px solid var(--sidebar-border);
    padding:26px 18px 18px;
    display:flex;
    flex-direction:column;
    transition:width .2s ease, flex-basis .2s ease, padding .2s ease;
    overflow:hidden;
  }
  .sidebar.collapsed{
    width:78px;
    flex:0 0 78px;
    padding:26px 14px;
  }
  .logo{
    padding:0 6px 26px;
  }
  .sidebar.collapsed .logo{padding:0 0 22px;}
  .logo-full{
    display:flex;
    align-items:center;
  }
  .logo-full .logo-svg{
    width:100%;
    max-width:170px;
    height:auto;
    display:block;
    border-radius:10px;
  }
  .logo-mini{
    display:none;
    width:38px;
    height:38px;
    border-radius:50%;
    background:#1a1a1a;
    border:3px solid #c9a860;
    color:#fff;
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;
    font-size:13px;
    align-items:center;
    justify-content:center;
    margin:0 auto;
  }
  .sidebar.collapsed .logo-full{display:none;}
  .sidebar.collapsed .logo-mini{display:flex;}
  nav.nav-list{
    display:flex;
    flex-direction:column;
    gap:2px;
    margin-top:6px;
    flex:1;
    min-height:0;
    overflow-y:auto;
  }
  nav.nav-list::-webkit-scrollbar{width:6px;}
  nav.nav-list::-webkit-scrollbar-thumb{background:var(--sidebar-active-bg);border-radius:3px;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 12px;
    border-radius:8px;
    color:#585544;
    text-decoration:none;
    font-size:14.5px;
    position:relative;
    cursor:pointer;
    white-space:nowrap;
  }
  .nav-item:hover{
    background:#e9e4d6;
  }
  .nav-item.active{
    background:var(--sidebar-active-bg);
    color:#3d3624;
    font-weight:600;
  }
  .nav-item .icon{
    width:19px;
    height:19px;
    flex:0 0 19px;
    color:inherit;
  }
  .nav-item .label{
    flex:1;
  }
  .badge{
    min-width:18px;
    height:18px;
    padding:0 5px;
    border-radius:9px;
    color:#fff;
    font-size:11px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .badge.yellow{background:var(--yellow-badge);}
  .badge.red{background:var(--red);}
  .badge.green{background:var(--green);}

  .sidebar.collapsed .nav-item{justify-content:center;padding:11px 0;}
  .sidebar.collapsed .nav-item .label,
  .sidebar.collapsed .nav-item .badge{display:none;}
  .sidebar.collapsed .nav-item.has-badge::after{
    content:'';
    position:absolute;
    top:8px;
    right:16px;
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--yellow-badge);
  }
  .sidebar.collapsed .nav-item.has-badge.badge-red::after{background:var(--red);}
  .sidebar.collapsed .nav-item.has-badge.badge-green::after{background:var(--green);}

  /* ---- Nav groups / accordion / flyout ---- */
  .nav-item .chevron-mini{
    width:15px;
    height:15px;
    flex:0 0 15px;
    color:#93876c;
    transition:transform .15s ease;
  }
  .nav-group.open > .nav-item .chevron-mini{transform:rotate(180deg);}
  .nav-sublist{
    display:flex;
    flex-direction:column;
    gap:1px;
    max-height:0;
    overflow:hidden;
    transition:max-height .22s ease;
  }
  .nav-group.open > .nav-sublist{
    max-height:800px;
    padding:2px 0 4px;
  }
  .nav-item.sub{
    padding:7px 12px 7px 38px;
    font-size:13.3px;
    border-radius:6px;
  }
  .nav-item.subsub{padding-left:50px;}
  .nav-subgroup-label{
    padding:7px 12px 3px 38px;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--text-light-muted);
    cursor:pointer;
    user-select:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
  }
  .nav-subgroup-label:hover{color:var(--text-dark);}
  .nav-subgroup-label .chevron-mini2{
    width:11px;
    height:11px;
    flex:0 0 11px;
    color:var(--text-light-muted);
    transition:transform .15s ease;
  }
  .nav-subgroup.open > .nav-subgroup-label .chevron-mini2{transform:rotate(180deg);}
  .nav-subgroup-list{
    display:flex;
    flex-direction:column;
    gap:1px;
    max-height:0;
    overflow:hidden;
    transition:max-height .18s ease;
  }
  .nav-subgroup.open > .nav-subgroup-list{max-height:400px;}
  .badge.small{
    min-width:15px;
    height:15px;
    padding:0 4px;
    font-size:9.5px;
    margin-left:6px;
    flex:0 0 auto;
  }
  .sidebar.collapsed .nav-sublist,
  .sidebar.collapsed .nav-subgroup-label,
  .sidebar.collapsed .chevron-mini{display:none !important;}

  #sidebarFlyout{
    position:fixed;
    z-index:300;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 10px 28px rgba(41,50,36,.16);
    padding:8px;
    min-width:216px;
    max-width:290px;
    max-height:76vh;
    overflow-y:auto;
    display:none;
  }
  #sidebarFlyout.show{display:block;}
  .flyout-header{
    padding:6px 10px 8px;
    font-size:13.5px;
    font-weight:700;
    color:var(--text-dark);
    border-bottom:1px solid var(--border);
    margin-bottom:4px;
    white-space:nowrap;
  }
  #sidebarFlyout .nav-item.sub{padding-left:12px;}
  #sidebarFlyout .nav-item.subsub{padding-left:24px;}
  #sidebarFlyout .nav-subgroup-label{padding-left:12px;}

  /* ---------------- Main / Topbar ---------------- */
  .main-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .topbar{
    height:64px;
    flex:0 0 64px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 28px;
    border-bottom:1px solid var(--border);
    gap:16px;
  }
  .breadcrumb{
    font-size:15px;
    white-space:nowrap;
  }
  .breadcrumb .muted{
    color:var(--text-muted);
  }
  .breadcrumb .current{
    color:var(--text-dark);
    font-weight:700;
    margin-left:6px;
  }
  .topbar-right{
    display:flex;
    align-items:center;
    gap:16px;
    min-width:0;
  }
  .exact-status{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12.5px;
    color:var(--text-muted);
    white-space:nowrap;
  }
  .exact-status .exact-check{
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--green);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 16px;
  }
  .exact-status .exact-check .icon{width:9px;height:9px;}
  .exact-status strong{color:var(--text-dark);font-weight:700;}
  .exact-status .exact-sub{color:var(--text-light-muted);}
  .bell-wrap{
    position:relative;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#f4f2ec;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#6b6a5f;
    border:none;
    cursor:pointer;
    flex:0 0 34px;
  }
  .bell-wrap .icon{width:17px;height:17px;}
  .bell-badge{
    position:absolute;
    top:-5px;
    right:-8px;
    background:var(--red);
    color:#fff;
    font-size:9.5px;
    font-weight:700;
    padding:2px 4px;
    border-radius:9px;
    line-height:1;
  }
  .divider-v{
    width:1px;
    height:28px;
    background:var(--border);
    flex:0 0 1px;
  }
  .user-menu-wrap{position:relative;}
  .user-chip{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    background:none;
    border:none;
    white-space:nowrap;
  }
  .avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    background:linear-gradient(135deg,#e3b6a4,#c98b7b);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:700;
    flex:0 0 34px;
  }
  .user-chip .name{
    font-weight:600;
    font-size:14.5px;
    color:var(--text-dark);
  }
  .user-chip .icon{width:14px;height:14px;color:#8c8878;transition:transform .15s ease;}
  .user-chip[aria-expanded="true"] .icon{transform:rotate(180deg);}
  .dropdown-menu{
    position:absolute;
    top:calc(100% + 12px);
    right:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.14);
    padding:6px;
    min-width:170px;
    z-index:30;
  }
  .dropdown-menu[hidden]{display:none;}
  .dropdown-menu button{
    width:100%;
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 10px;
    border:none;
    background:none;
    border-radius:7px;
    font-size:13.5px;
    color:var(--text-dark);
    cursor:pointer;
    text-align:left;
  }
  .dropdown-menu button:hover{background:var(--sidebar-bg);}
  .dropdown-menu .icon{width:15px;height:15px;color:var(--text-muted);flex:0 0 15px;}

  /* ---------------- Shared data-table bits reused here ---------------- */
  .status-badge{
    display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
    border-radius:12px;font-size:12px;font-weight:600;white-space:nowrap;
  }
  .status-badge .icon{width:11px;height:11px;}
  .status-badge.status-new{background:#eef2f7;color:#5d6481;}
  .status-badge.status-delivery{background:var(--tan-pale-bg);color:var(--tan);}
  .status-badge.status-cancelled{background:#fbe7e5;color:var(--red);}
  .status-badge.status-completed{background:var(--green-pale-bg);color:var(--green);}
  .status-badge.status-changed{background:#f3e8f7;color:#8a5fae;}
  .status-badge.status-expired{background:#fbe7e5;color:var(--red);}
  .status-badge.status-expiring{background:var(--tan-pale-bg);color:var(--tan);}
  .status-badge.status-activequote{background:var(--green-pale-bg);color:var(--green);}
  .row-actions{display:flex;align-items:center;gap:8px;}
  .row-action-btn{
    width:26px;height:26px;border-radius:6px;border:none;background:none;
    color:var(--text-muted);display:flex;align-items:center;justify-content:center;
    cursor:pointer;position:relative;
  }
  .row-action-btn:hover{background:var(--sidebar-bg);color:var(--green);}
  .row-action-btn .icon{width:14px;height:14px;}
  .row-action-btn.spinning .icon{animation:spin .7s linear;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .row-action-btn[title]:hover::after{
    content:attr(title);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:#293224;color:#fff;font-size:11px;font-weight:500;white-space:nowrap;
    padding:5px 9px;border-radius:6px;z-index:20;pointer-events:none;
  }
  .collapse-btn{
    position:absolute;bottom:70px;width:26px;height:26px;border-radius:50%;background:#fff;
    border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;
    align-items:center;justify-content:center;color:#8c8878;cursor:pointer;
    transition:left .22s ease;z-index:5;
  }
  .collapse-btn:hover{color:var(--green);}
  .collapse-btn.left{left:238px;}
  .collapse-btn .icon{width:13px;height:13px;transition:transform .2s ease;}
  .collapse-btn.flipped .icon{transform:rotate(180deg);}
  .app.sidebar-collapsed .collapse-btn.left{left:66px;}

  /* ---------------- Content area ---------------- */
  .content-area{
    flex:1;
    display:flex;
    min-height:0;
  }

  /* ---------------- Detail view ---------------- */
  .dv-main{flex:1;min-width:0;padding:26px 34px 40px;overflow-y:auto;}
  .dv-back-link{
    display:inline-flex;align-items:center;gap:8px;color:var(--text-dark);
    text-decoration:none;font-size:18px;font-weight:700;margin-bottom:20px;
  }
  .dv-back-link:hover{color:var(--green);}
  .dv-back-link .icon{width:20px;height:20px;}

  .dv-top-grid{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:20px;margin-bottom:20px;align-items:start;}
  .dv-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px 22px;}
  .dv-card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;user-select:none;}
  .dv-card.open .dv-card-header{margin-bottom:12px;}
  .dv-card-title-wrap{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .dv-card-header h2{font-size:14.5px;font-weight:700;color:var(--text-dark);margin:0;}
  .dv-card-summary{font-size:12.5px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;}
  .dv-card-summary .status-badge{padding:2px 8px;}
  .dv-card.open .dv-card-summary{display:none;}
  .dv-card-toggle{
    width:28px;height:28px;flex:0 0 28px;border-radius:8px;border:none;background:none;
    color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .dv-card-toggle:hover{background:var(--sidebar-bg);color:var(--green);}
  .dv-card-toggle .icon{width:16px;height:16px;transition:transform .2s ease;}
  .dv-card.open .dv-card-toggle .icon{transform:rotate(180deg);}
  .dv-card-body{max-height:0;overflow:hidden;opacity:0;transition:max-height .28s ease, opacity .2s ease;}
  .dv-card.open .dv-card-body{max-height:640px;opacity:1;}
  .dv-card.open.settled .dv-card-body{overflow:visible;}
  .view-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
  .view-row:last-child{border-bottom:none;}
  .view-row .lbl{color:var(--text-muted);white-space:nowrap;}
  .view-row .val{font-weight:600;color:var(--text-dark);text-align:right;}

  /* Inline-editable Status / Delivery week */
  .status-edit-trigger, .week-edit-trigger{
    display:inline-flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;
    padding:3px 6px;border-radius:8px;font:inherit;font-weight:600;color:var(--text-dark);
  }
  .status-edit-trigger:hover, .week-edit-trigger:hover{background:var(--sidebar-bg);}
  .week-edit-trigger .icon{width:14px;height:14px;color:var(--text-muted);}
  .chevron-sm{width:11px;height:11px;color:var(--text-muted);flex:0 0 11px;}
  .status-edit-panel{
    position:absolute;top:calc(100% + 4px);right:0;background:#fff;border:1px solid var(--border);
    border-radius:10px;box-shadow:0 12px 28px rgba(41,50,36,.14);padding:6px;min-width:250px;z-index:40;
  }
  .status-edit-panel[hidden]{display:none;}
  .status-option{
    display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:none;background:none;
    border-radius:7px;cursor:pointer;font-size:13px;color:var(--text-dark);text-align:left;font-family:inherit;
  }
  .status-option:hover{background:var(--sidebar-bg);}
  .status-option.active{background:var(--green-pale-bg);}
  .status-badge.status-onhold{background:#fdf1de;color:#a9700c;}
  .status-badge.status-freedelivery{background:#fdece0;color:#c05621;}

  .week-picker-popover{
    position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--border);
    border-radius:12px;box-shadow:0 16px 40px rgba(41,50,36,.16);z-index:50;padding:16px;width:280px;
  }
  .week-picker-popover[hidden]{display:none;}
  .wp-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .wp-cal-header span{font-size:14px;font-weight:700;color:var(--text-dark);}
  .drp-nav{width:26px;height:26px;border-radius:6px;border:none;background:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .drp-nav:hover{background:var(--sidebar-bg);color:var(--green);}
  .drp-nav .icon{width:14px;height:14px;}
  .drp-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:4px;}
  .drp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .drp-day{
    height:32px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-dark);
    cursor:pointer;border-radius:6px;background:none;border:none;font-family:inherit;position:relative;
  }
  .drp-day.other-month{color:var(--text-light-muted);}
  .drp-day:hover{background:var(--sidebar-bg);}
  .drp-day.today{font-weight:700;box-shadow:inset 0 0 0 1.5px var(--green);}
  .drp-day.in-week{background:var(--green-pale-bg);}
  .drp-day.in-week.week-start{border-radius:6px 0 0 6px;}
  .drp-day.in-week.week-end{border-radius:0 6px 6px 0;}
  .drp-day.week-selected{background:var(--green);color:#fff;font-weight:700;}
  .drp-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);gap:10px;}
  .drp-range-label{font-size:12px;color:var(--text-muted);}
  .drp-footer-actions{display:flex;gap:8px;flex:0 0 auto;}
  .drp-footer-actions button{height:32px;padding:0 14px;border-radius:7px;font-size:12.5px;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
  .drp-cancel{background:none;color:var(--text-muted);}
  .drp-cancel:hover{color:var(--red);}
  .drp-apply{background:var(--green);color:#fff;}
  .drp-apply:hover{background:var(--green-dark);}

  .dv-panel{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px 22px;}
  .dv-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:16px;flex-wrap:wrap;}
  .dv-panel-header h2{font-size:15px;font-weight:700;color:var(--text-dark);margin:0;}
  .dv-btn-group{display:flex;gap:10px;flex-wrap:wrap;}
  .dv-btn{
    display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 16px;
    border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
    border:1px solid var(--border);background:#fff;color:var(--text-dark);
  }
  .dv-btn:hover{background:var(--sidebar-bg);}
  .dv-btn .icon{width:14px;height:14px;}
  .dv-btn.primary{background:var(--green);color:#fff;border-color:var(--green);}
  .dv-btn.primary:hover{background:var(--green-dark);}
  .dv-btn.danger{background:#fff;color:var(--red);border-color:#f3c6c3;}
  .dv-btn.danger:hover{background:#fbe7e5;}
  .dv-btn.icon-only{width:36px;padding:0;justify-content:center;}
  .dv-btn-main{font-weight:700;box-shadow:0 3px 10px rgba(89,118,113,.3);}
  .dv-more-wrap{position:relative;}
  .dv-more-wrap .dropdown-menu{left:0;right:auto;top:calc(100% + 8px);}

  table.dv-line-table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px;}
  .dv-line-table thead th{
    text-align:left;padding:10px 12px;color:var(--text-muted);font-weight:600;
    border-bottom:2px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.03em;
  }
  .dv-line-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-dark);}
  .dv-line-table tr.dv-line-main td{font-weight:700;}
  .dv-line-table tr.dv-line-sub td{color:var(--text-muted);font-size:13px;}
  .dv-line-table tr.dv-line-sub td.dv-indent{padding-left:26px;}
  .dv-line-table tr.dv-subtotal-row td{font-weight:700;border-bottom:none;padding-top:14px;}
  .dv-line-table tr.dv-subtotal-row td:first-child{text-align:right;}

  .dv-summary{display:flex;justify-content:flex-end;margin-top:8px;}
  .dv-summary-inner{width:280px;}
  .dv-summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13.5px;color:var(--text-muted);}
  .dv-summary-row.total{border-top:2px solid var(--border);margin-top:4px;padding-top:12px;font-weight:700;color:var(--text-dark);font-size:15px;}
  .dv-summary-row .val{font-weight:600;color:var(--text-dark);}
  .dv-summary-row.total .val{color:var(--green);}

  @media (max-width:1100px){
    .dv-top-grid{grid-template-columns:1fr;}
  }
</style>
</head>

  /* Week picker: same calendar component as elsewhere in the app, adapted to select whole ISO weeks */
  var WEEKDAY_LABELS = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  var MONTH_LABELS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var today = new Date(); today.setHours(0,0,0,0);

  function dOnly(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function addDays(d, n){ var r = new Date(d); r.setDate(r.getDate() + n); return r; }
  function sameDay(a, b){ return a && b && a.getTime() === b.getTime(); }
  function mondayOf(d){ var day = (d.getDay() + 6) % 7; return addDays(dOnly(d), -day); }
  function isoWeekInfo(date){
    var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    var dayNum = (d.getUTCDay() + 6) % 7;
    d.setUTCDate(d.getUTCDate() - dayNum + 3);
    var firstThursday = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
    var week = 1 + Math.round(((d - firstThursday) / 86400000 - 3 + ((firstThursday.getUTCDay() + 6) % 7)) / 7);
    return { week: week, year: d.getUTCFullYear() };
  }
  function mondayFromIsoWeek(year, week){
    var simple = new Date(Date.UTC(year, 0, 1 + (week - 1) * 7));
    var dow = simple.getUTCDay() || 7;
    simple.setUTCDate(simple.getUTCDate() + 1 - dow);
    return new Date(simple.getUTCFullYear(), simple.getUTCMonth(), simple.getUTCDate());
  }

  var wp = { viewMonth: new Date(today.getFullYear(), today.getMonth(), 1), selectedMonday: null };

  function renderWeekCalendar(){
    wpMonthLabel.textContent = MONTH_LABELS[wp.viewMonth.getMonth()] + ' ' + wp.viewMonth.getFullYear();
    wpDaysGrid.innerHTML = '';
    var firstOfMonth = new Date(wp.viewMonth.getFullYear(), wp.viewMonth.getMonth(), 1);
    var startOffset = (firstOfMonth.getDay() + 6) % 7;
    var gridStart = addDays(firstOfMonth, -startOffset);
    for(var i = 0; i < 42; i++){
      var day = addDays(gridStart, i);
      var dayMonday = mondayOf(day);
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'drp-day';
      btn.textContent = day.getDate();
      if(day.getMonth() !== wp.viewMonth.getMonth()) btn.classList.add('other-month');
      if(sameDay(day, today)) btn.classList.add('today');
      if(i % 7 === 0) btn.classList.add('week-start');
      if(i % 7 === 6) btn.classList.add('week-end');
      if(wp.selectedMonday && sameDay(dayMonday, wp.selectedMonday)){
        btn.classList.add('in-week');
        if(sameDay(day, wp.selectedMonday) || sameDay(day, addDays(wp.selectedMonday, 6))) btn.classList.add('week-selected');
      }
      btn.addEventListener('click', (function(day){
        return function(){
          wp.selectedMonday = mondayOf(day);
          renderWeekCalendar();
          var info = isoWeekInfo(wp.selectedMonday);
          wpWeekLabel.textContent = 'Week ' + info.week + ', ' + info.year;
        };
      })(day));
      wpDaysGrid.appendChild(btn);
    }
  }

      openOrderPdf(false);
    } else if(key === 'pdf-dealer'){
      openOrderPdf(true);
    } else if(key === 'edit'){
      window.location.href = 'place-order.html?order=' + encodeURIComponent(detail.number);
    } else if(key === 'assign'){
      window.alert('Assigned to Bugloos Team.');
    } else if(key === 'split' || key === 'service'){
      window.alert(btn.textContent + ' (prototype action).');
    } else if(key === 'custom-row'){
      var desc = window.prompt('Description for the custom row:');
      if(desc){
        var row = document.createElement('tr');
        row.className = 'dv-line-sub';
        row.innerHTML = '<td class="dv-indent">' + desc + '</td><td></td><td>1</td><td>-</td><td>-</td>';
        document.querySelector('.dv-subtotal-row').before(row);
      }
    } else if(key === 'discount'){
      var amt = window.prompt('Discount amount (EUR):', '0');
      if(amt && !isNaN(Number(amt)) && Number(amt) > 0){
        var row2 = document.createElement('tr');
        row2.className = 'dv-line-sub';
        row2.innerHTML = '<td class="dv-indent">Discount</td><td></td><td>1</td><td>-' + fmtCurrency(amt) + '</td><td>-' + fmtCurrency(amt) + '</td>';
        document.querySelector('.dv-subtotal-row').before(row2);
      }
    }
    moreActionsMenu.hidden = true;
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 40 40%27%3E%3Ccircle cx=%2720%27 cy=%2720%27 r=%2718%27 fill=%27%231a1a1a%27 stroke=%27%23c9a860%27 stroke-width=%273%27/%3E%3Ctext x=%2720%27 y=%2726%27 text-anchor=%27middle%27 font-family=%27Georgia,serif%27 font-weight=%27700%27 font-size=%2715%27 fill=%27%23ffffff%27%3EUS%3C/text%3E%3C/svg%3E">
<title>UrbanSofa &mdash; Invoices</title>
<style>
  :root{
    --sidebar-bg:#f0ebe3;
    --sidebar-active-bg:#c6b8a1;
    --sidebar-border:#e6e1d5;
    --green:#597671;
    --green-dark:#46615c;
    --green-pale-bg:#e4eae9;
    --tan:#b08a3e;
    --tan-pale-bg:#f2e9d3;
    --tan-line:#c9a860;
    --red:#e2544c;
    --yellow-badge:#eab445;
    --border:#e3e0d8;
    --border-dashed:#d8cba0;
    --text-dark:#293224;
    --text-muted:#738297;
    --text-light-muted:#a1b1c7;
    --bg-page:#ffffff;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:'Source Sans Pro',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text-dark);
    background:var(--bg-page);
    font-size:14px;
    line-height:1.43;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;}
  .app{
    display:flex;
    height:100vh;
    width:100%;
    position:relative;
    overflow:hidden;
  }

  /* ---------------- Sidebar ---------------- */
  .sidebar{
    width:250px;
    flex:0 0 250px;
    background:var(--sidebar-bg);
    border-right:1px solid var(--sidebar-border);
    padding:26px 18px 18px;
    display:flex;
    flex-direction:column;
    transition:width .2s ease, flex-basis .2s ease, padding .2s ease;
    overflow:hidden;
  }
  .sidebar.collapsed{
    width:78px;
    flex:0 0 78px;
    padding:26px 14px;
  }
  .logo{
    padding:0 6px 26px;
  }
  .sidebar.collapsed .logo{padding:0 0 22px;}
  .logo-full .brand{
    font-family:Georgia,"Times New Roman",serif;
    font-style:italic;
    font-weight:700;
    font-size:22px;
    color:var(--green);
    letter-spacing:.2px;
    white-space:nowrap;
  }
  .logo-full .brand sup{
    font-size:10px;
    font-weight:400;
  }
  .logo-full .tagline{
    font-family:Georgia,"Times New Roman",serif;
    font-style:italic;
    font-size:13px;
    color:#9a8a63;
    margin-top:-2px;
    white-space:nowrap;
  }
  .logo-mini{
    display:none;
    width:38px;
    height:38px;
    border-radius:50%;
    background:#1a1a1a;
    border:3px solid #c9a860;
    color:#fff;
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;
    font-size:13px;
    align-items:center;
    justify-content:center;
    margin:0 auto;
  }
  .sidebar.collapsed .logo-full{display:none;}
  .sidebar.collapsed .logo-mini{display:flex;}
  nav.nav-list{
    display:flex;
    flex-direction:column;
    gap:2px;
    margin-top:6px;
    flex:1;
    min-height:0;
    overflow-y:auto;
  }
  nav.nav-list::-webkit-scrollbar{width:6px;}
  nav.nav-list::-webkit-scrollbar-thumb{background:var(--sidebar-active-bg);border-radius:3px;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 12px;
    border-radius:8px;
    color:#585544;
    text-decoration:none;
    font-size:14.5px;
    position:relative;
    cursor:pointer;
    white-space:nowrap;
  }
  .nav-item:hover{
    background:#e9e4d6;
  }
  .nav-item.active{
    background:var(--sidebar-active-bg);
    color:#3d3624;
    font-weight:600;
  }
  .nav-item .icon{
    width:19px;
    height:19px;
    flex:0 0 19px;
    color:inherit;
  }
  .nav-item .label{
    flex:1;
  }
  .badge{
    min-width:18px;
    height:18px;
    padding:0 5px;
    border-radius:9px;
    color:#fff;
    font-size:11px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .badge.yellow{background:var(--yellow-badge);}
  .badge.red{background:var(--red);}
  .badge.green{background:var(--green);}

  .sidebar.collapsed .nav-item{justify-content:center;padding:11px 0;}
  .sidebar.collapsed .nav-item .label,
  .sidebar.collapsed .nav-item .badge{display:none;}
  .sidebar.collapsed .nav-item.has-badge::after{
    content:'';
    position:absolute;
    top:8px;
    right:16px;
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--yellow-badge);
  }
  .sidebar.collapsed .nav-item.has-badge.badge-red::after{background:var(--red);}
  .sidebar.collapsed .nav-item.has-badge.badge-green::after{background:var(--green);}

  /* ---- Nav groups / accordion / flyout ---- */
  .nav-item .chevron-mini{
    width:15px;
    height:15px;
    flex:0 0 15px;
    color:#93876c;
    transition:transform .15s ease;
  }
  .nav-group.open > .nav-item .chevron-mini{transform:rotate(180deg);}
  .nav-sublist{
    display:flex;
    flex-direction:column;
    gap:1px;
    max-height:0;
    overflow:hidden;
  }
  .nav-group.open > .nav-sublist{
    max-height:none;
    padding:2px 0 4px;
  }
  .nav-item.sub{
    padding:7px 12px 7px 38px;
    font-size:13.3px;
    border-radius:6px;
  }
  .nav-item.subsub{padding-left:50px;}
  .nav-subgroup-label{
    padding:7px 12px 3px 38px;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--text-light-muted);
    cursor:default;
    user-select:none;
  }
  .badge.small{
    min-width:15px;
    height:15px;
    padding:0 4px;
    font-size:9.5px;
    margin-left:6px;
    flex:0 0 auto;
  }
  .sidebar.collapsed .nav-sublist,
  .sidebar.collapsed .nav-subgroup-label,
  .sidebar.collapsed .chevron-mini{display:none !important;}

  #sidebarFlyout{
    position:fixed;
    z-index:300;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 10px 28px rgba(41,50,36,.16);
    padding:8px;
    min-width:216px;
    max-width:290px;
    max-height:76vh;
    overflow-y:auto;
    display:none;
  }
  #sidebarFlyout.show{display:block;}
  .flyout-header{
    padding:6px 10px 8px;
    font-size:13.5px;
    font-weight:700;
    color:var(--text-dark);
    border-bottom:1px solid var(--border);
    margin-bottom:4px;
    white-space:nowrap;
  }
  #sidebarFlyout .nav-item.sub{padding-left:12px;}
  #sidebarFlyout .nav-item.subsub{padding-left:24px;}
  #sidebarFlyout .nav-subgroup-label{padding-left:12px;}

  /* ---------------- Main / Topbar ---------------- */
  .main-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .topbar{
    height:64px;
    flex:0 0 64px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 28px;
    border-bottom:1px solid var(--border);
    gap:16px;
  }
  .breadcrumb{
    font-size:15px;
    white-space:nowrap;
  }
  .breadcrumb .muted{
    color:var(--text-muted);
  }
  .breadcrumb .current{
    color:var(--text-dark);
    font-weight:700;
    margin-left:6px;
  }
  .topbar-right{
    display:flex;
    align-items:center;
    gap:16px;
    min-width:0;
  }
  .exact-status{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12.5px;
    color:var(--text-muted);
    white-space:nowrap;
  }
  .exact-status .exact-check{
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--green);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 16px;
  }
  .exact-status .exact-check .icon{width:9px;height:9px;}
  .exact-status strong{color:var(--text-dark);font-weight:700;}
  .exact-status .exact-sub{color:var(--text-light-muted);}
  .bell-wrap{
    position:relative;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#f4f2ec;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#6b6a5f;
    border:none;
    cursor:pointer;
    flex:0 0 34px;
  }
  .bell-wrap .icon{width:17px;height:17px;}
  .bell-badge{
    position:absolute;
    top:-5px;
    right:-8px;
    background:var(--red);
    color:#fff;
    font-size:9.5px;
    font-weight:700;
    padding:2px 4px;
    border-radius:9px;
    line-height:1;
  }
  .divider-v{
    width:1px;
    height:28px;
    background:var(--border);
    flex:0 0 1px;
  }
  .user-menu-wrap{position:relative;}
  .user-chip{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    background:none;
    border:none;
    white-space:nowrap;
  }
  .avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    background:linear-gradient(135deg,#e3b6a4,#c98b7b);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:700;
    flex:0 0 34px;
  }
  .user-chip .name{
    font-weight:600;
    font-size:14.5px;
    color:var(--text-dark);
  }
  .user-chip .icon{width:14px;height:14px;color:#8c8878;transition:transform .15s ease;}
  .user-chip[aria-expanded="true"] .icon{transform:rotate(180deg);}
  .dropdown-menu{
    position:absolute;
    top:calc(100% + 12px);
    right:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.14);
    padding:6px;
    min-width:170px;
    z-index:30;
  }
  .dropdown-menu[hidden]{display:none;}
  .dropdown-menu button{
    width:100%;
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 10px;
    border:none;
    background:none;
    border-radius:7px;
    font-size:13.5px;
    color:var(--text-dark);
    cursor:pointer;
    text-align:left;
  }
  .dropdown-menu button:hover{background:var(--sidebar-bg);}
  .dropdown-menu .icon{width:15px;height:15px;color:var(--text-muted);flex:0 0 15px;}

  /* Field grid */
  .field-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:28px;
    margin-bottom:22px;
  }
  .field label.field-label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13.5px;
    font-weight:600;
    color:#3a3830;
    margin-bottom:8px;
  }
  .field label.field-label .req{color:var(--red);}
  .field label.field-label .icon{width:14px;height:14px;color:#b7b3a4;}
  .input, .select{
    width:100%;
    height:42px;
    border:1px solid var(--border);
    border-radius:8px;
    padding:0 10px 0 14px;
    font-size:14px;
    color:#4a473c;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:var(--shadow-sm);
    position:relative;
    gap:6px;
  }
  .input.disabled, .select.disabled{
    color:#b9b6ab;
    background:#fbfaf7;
  }
  .select .chevron{width:14px;height:14px;color:#8c8878;flex:0 0 14px;pointer-events:none;transition:transform .15s ease;}
  .select.open .chevron{transform:rotate(180deg);}
  .select select.field-select{
    position:absolute;
    width:1px;
    height:1px;
    padding:0;
    margin:0;
    overflow:hidden;
    clip:rect(0,0,0,0);
    border:0;
    opacity:0;
  }
  .select-trigger{
    flex:1;
    min-width:0;
    height:100%;
    border:none;
    background:none;
    padding:0;
    margin:0;
    text-align:left;
    font:inherit;
    color:#4a473c;
    cursor:pointer;
    display:flex;
    align-items:center;
  }
  .select-trigger:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px;}
  .select.disabled .select-trigger{color:#b9b6ab;cursor:not-allowed;}
  .select-display{
    width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .select-clear{
    display:none;
    align-items:center;
    justify-content:center;
    width:16px;
    height:16px;
    border-radius:50%;
    border:none;
    background:#ece7db;
    color:#8c8878;
    cursor:pointer;
    flex:0 0 16px;
    padding:0;
    line-height:0;
  }
  .select-clear .icon{width:8px;height:8px;display:block;}
  .select-clear:hover{background:var(--red);color:#fff;}
  .select.has-value .select-clear{display:flex;}
  .select.disabled .select-clear{display:none !important;}
  .select-options-panel{
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    right:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:8px;
    box-shadow:0 12px 28px rgba(41,50,36,.14);
    padding:6px;
    max-height:248px;
    overflow-y:auto;
    z-index:40;
  }
  .select-options-panel[hidden]{display:none;}
  .select-option{
    padding:9px 12px;
    border-radius:6px;
    font-size:14px;
    font-family:inherit;
    color:#4a473c;
    cursor:pointer;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .select-option:hover{background:var(--sidebar-bg);}
  .select-option.selected{background:var(--green-pale-bg);color:var(--green);font-weight:600;}
  input.text-input{
    border:none;
    outline:none;
    background:transparent;
    font-size:14px;
    color:#4a473c;
    width:100%;
    height:100%;
    font-family:inherit;
  }
  input.text-input::placeholder{color:#9a978c;}
  input.text-input:disabled{color:#b9b6ab;}
  .collapse-btn{
    position:absolute;
    bottom:70px;
    width:26px;
    height:26px;
    border-radius:50%;
    background:#fff;
    border:1px solid var(--border);
    box-shadow:0 1px 3px rgba(0,0,0,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#8c8878;
    cursor:pointer;
    transition:left .22s ease;
    z-index:5;
  }
  .collapse-btn:hover{color:var(--green);}
  .collapse-btn.left{left:238px;}
  .collapse-btn .icon{width:13px;height:13px;transition:transform .2s ease;}
  .collapse-btn.flipped .icon{transform:rotate(180deg);}
  .app.sidebar-collapsed .collapse-btn.left{left:66px;}

  /* ---------------- Shared data-table component ---------------- */
  .status-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:4px 10px;
    border-radius:12px;
    font-size:12px;
    font-weight:600;
    white-space:nowrap;
  }
  .status-badge .icon{width:11px;height:11px;}

  .row-actions{display:flex;align-items:center;gap:8px;}
  .row-action-btn{
    width:26px;
    height:26px;
    border-radius:6px;
    border:none;
    background:none;
    color:var(--text-muted);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .row-action-btn:hover{background:var(--sidebar-bg);color:var(--green);}
  .row-action-btn .icon{width:14px;height:14px;}
  .row-action-btn.spinning .icon{animation:spin .7s linear;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  /* ---------------- Content area ---------------- */
  .content-area{
    flex:1;
    display:flex;
    min-height:0;
  }



  .dt-main{
    flex:1;
    min-width:0;
    padding:26px 34px 40px;
    overflow-y:auto;
  }
  .dt-page-title{font-size:18px;font-weight:700;color:var(--text-dark);margin:0 0 20px;}
  .dt-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:22px 24px 20px;}
  .dt-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:16px;}
  .dt-card-header h2{font-size:15px;font-weight:700;color:var(--text-dark);margin:0;}
  .dt-add-btn{
    display:flex;align-items:center;gap:8px;
    background:var(--green);color:#fff;border:none;border-radius:8px;
    padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;
    text-decoration:none;
  }
  .dt-add-btn:hover{background:var(--green-dark);}
  .dt-add-btn .icon{width:15px;height:15px;}

  .dt-toolbar{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
  .dt-show{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--text-muted);white-space:nowrap;}
  .dt-show .select{width:72px;height:34px;padding:0 8px 0 12px;}
  .dt-refresh-btn{
    width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:#fff;
    color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 30px;
  }
  .dt-refresh-btn:hover{background:var(--sidebar-bg);color:var(--green);}
  .dt-refresh-btn .icon{width:15px;height:15px;}
  .dt-refresh-btn.spinning .icon{animation:spin .7s linear;}
  .dt-spacer{flex:1;}
  .dt-search{display:flex;align-items:center;gap:8px;}
  .dt-search label{font-size:13.5px;color:var(--text-muted);white-space:nowrap;}
  .dt-search input{
    height:34px;border:1px solid var(--border);border-radius:8px;padding:0 12px;
    font-size:13.5px;font-family:inherit;width:220px;color:var(--text-dark);
  }
  .dt-search input:focus{outline:none;border-color:var(--green);}

  .dt-filters-row{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
  .dt-check-filter{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--text-dark);cursor:pointer;white-space:nowrap;}
  .dt-check-filter input[type="checkbox"]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;}
  .dt-date-range{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--text-muted);white-space:nowrap;}
  .dt-date-range input[type="date"]{
    height:34px;border:1px solid var(--border);border-radius:8px;padding:0 10px;
    font-size:13px;font-family:inherit;color:var(--text-dark);
  }
  .dt-filter-select .select{width:170px;height:34px;padding:0 10px 0 12px;}

  .dt-bulk{display:flex;align-items:center;gap:0;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .dt-bulk .select{width:150px;height:34px;border:none;border-radius:0;box-shadow:none;padding:0 8px 0 12px;}
  .dt-bulk-apply-btn{
    height:34px;padding:0 16px;border:none;background:var(--green);color:#fff;
    font-size:13px;font-weight:600;cursor:pointer;border-left:1px solid rgba(255,255,255,.2);white-space:nowrap;
  }
  .dt-bulk-apply-btn:hover{background:var(--green-dark);}

  .dt-table-wrap{overflow-x:auto;}
  table.dt-table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .dt-table thead th{
    text-align:left;padding:11px 14px;color:var(--text-muted);font-weight:600;
    border-bottom:2px solid var(--border);white-space:nowrap;font-size:12.5px;
    text-transform:uppercase;letter-spacing:.03em;
  }
  .dt-table thead th.sortable{cursor:pointer;user-select:none;}
  .dt-table thead th.sortable:hover{color:var(--green);}
  .dt-sort-icons{display:inline-flex;flex-direction:column;margin-left:5px;vertical-align:middle;gap:1px;}
  .dt-sort-icons .icon{width:9px;height:9px;color:#c8c4b6;display:block;}
  .dt-table thead th.sort-asc .dt-sort-icons .icon.up,
  .dt-table thead th.sort-desc .dt-sort-icons .icon.down{color:var(--green);}
  .dt-table tbody td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text-dark);vertical-align:middle;}
  .dt-table tbody tr:hover{background:var(--sidebar-bg);}
  .dt-table tbody tr.selected{background:var(--green-pale-bg);}
  .dt-table tbody tr:last-child td{border-bottom:none;}
  .dt-table a.dt-link{color:var(--green);text-decoration:none;font-weight:600;}
  .dt-table a.dt-link:hover{text-decoration:underline;}
  .dt-table input[type="checkbox"].dt-row-check{width:16px;height:16px;accent-color:var(--green);cursor:pointer;}
  .dt-muted{color:var(--text-light-muted);}
  .dt-amount{font-weight:600;color:var(--text-dark);white-space:nowrap;}

  .status-badge.status-open{background:#eef2f7;color:#5d6481;}
  .status-badge.status-partial{background:var(--tan-pale-bg);color:var(--tan);}
  .status-badge.status-paid{background:var(--green-pale-bg);color:var(--green);}
  .status-badge.status-credit{background:#fbe7e5;color:var(--red);}
  .status-badge.status-active{background:var(--green-pale-bg);color:var(--green);}
  .status-badge.status-create{background:#eef2f7;color:#5d6481;}
  .status-badge.status-approve{background:var(--green-pale-bg);color:var(--green);}
  .status-badge.status-edit{background:var(--tan-pale-bg);color:var(--tan);}

  .dt-inline-edit{
    width:56px;height:30px;border:1px solid var(--border);border-radius:6px;
    padding:0 8px;font-size:13px;font-family:inherit;text-align:center;color:var(--text-dark);
  }
  .dt-inline-edit:focus{outline:none;border-color:var(--green);}

  .dt-pagination{display:flex;align-items:center;justify-content:space-between;margin-top:16px;font-size:13px;color:var(--text-muted);flex-wrap:wrap;gap:10px;}
  .dt-pagination .page-nav{display:flex;align-items:center;gap:8px;}
  .dt-pagination .page-nav button{
    width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:#fff;
    color:var(--text-dark);cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .dt-pagination .page-nav button:hover{background:var(--sidebar-bg);}
  .dt-pagination .page-nav button:disabled{opacity:.4;cursor:not-allowed;}
  .dt-pagination .page-nav button .icon{width:12px;height:12px;}
  .dt-no-results td{text-align:center;color:var(--text-muted);padding:30px !important;}

  .tooltip-wrap{position:relative;}
  .row-action-btn[title]:hover::after{
    content:attr(title);
    position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:#293224;color:#fff;font-size:11px;font-weight:500;white-space:nowrap;
    padding:5px 9px;border-radius:6px;z-index:20;pointer-events:none;
  }
  .row-action-btn{position:relative;}

  @media (max-width:1000px){
    .dt-toolbar, .dt-filters-row{flex-direction:column;align-items:stretch;}
    .dt-search input{width:100%;}
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-full">
        <div class="brand">UrbanSofa<sup>&reg;</sup></div>
        <div class="tagline">by Ira Ness</div>
      </div>
      <div class="logo-mini">US</div>
    </div>
    <nav class="nav-list" id="navList"></nav>
  </aside>
  <div id="sidebarFlyout"></div>

  <!-- Main -->
  <div class="main-wrap">
    <header class="topbar">
      <div class="breadcrumb">
        <span class="current">Invoices</span>
      </div>
      <div class="topbar-right">

          <span class="bell-badge">10+</span>
        </button>
        <div class="divider-v"></div>
        <div class="user-menu-wrap">
          <button class="user-chip" type="button" id="userMenuBtn" aria-haspopup="true" aria-expanded="false">
            <div class="avatar">MA</div>
            <span class="name">Mahsa Amiri</span>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="dropdown-menu" id="userMenu" hidden>
            <button type="button" data-action="lock">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
              Lock
            </button>
            <button type="button" data-action="logout">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
              Logout
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="content-area">
      <main class="dt-main">

        <h1 class="dt-page-title">Invoices</h1>

        <div class="dt-card">
          <div class="dt-card-header"><h2>Overview</h2></div>

          <div class="dt-toolbar">
            <div class="dt-show">
              <span>Show</span>
              <div class="select">
                <select class="field-select" id="pageSizeSelect">
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                </select>
                <svg class="icon chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </div>
              <span>Entries</span>
              <button type="button" class="dt-refresh-btn" id="refreshBtn" title="Refresh">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>
              </button>
            </div>
            <label class="dt-check-filter"><input type="checkbox" id="creditCheck"> Show credit invoices</label>
            <div class="dt-spacer"></div>
            <div class="dt-search">
              <label for="searchInput">Search:</label>
              <input type="text" id="searchInput" placeholder="Search invoices&hellip;">
            </div>
          </div>

          <div class="dt-filters-row">
            <div class="dt-bulk">
              <div class="select">
                <select class="field-select" id="bulkActionSelect">
                  <option value="">Actions</option>
                  <option value="download">Download</option>
                  <option value="sync">Sync with Exact</option>
                  <option value="markpaid">Mark as paid</option>
                </select>
                <svg class="icon chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </div>
              <button type="button" class="dt-bulk-apply-btn" id="bulkApplyBtn">Apply</button>
            </div>
            <div class="dt-spacer"></div>
            <div class="dt-date-range">
              <span>From</span>
              <input type="date" id="fromDate">
              <span>To</span>
              <input type="date" id="toDate">
            </div>
            <div class="dt-filter-select">
              <div class="select">
                <select class="field-select" id="dealerFilter">
                  <option value="">All</option>
                  <option>WoontrendsXL</option>
                  <option>UrbanSofa test account</option>
                  <option>Wooden Planet</option>
                  <option>Tiger Touch</option>

                <svg class="icon chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </div>
            </div>
            <div class="dt-filter-select">
              <div class="select">
                <select class="field-select" id="statusFilter">
                  <option value="">All</option>
                  <option>Open</option>
                  <option>Partial paid</option>
                  <option>Paid</option>
                  <option>Credit</option>
                </select>
                <svg class="icon chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </div>
            </div>
          </div>

          <div class="dt-table-wrap">
            <table class="dt-table" id="invoicesTable">
              <thead>
                <tr>
                  <th><input type="checkbox" class="dt-row-check" id="selectAllCheck"></th>
                  <th class="sortable" data-sort="date">Date</th>
                  <th class="sortable" data-sort="number">Invoice number</th>
                  <th class="sortable" data-sort="dealer">Invoice dealer</th>
                  <th class="sortable" data-sort="dueDate">Due date</th>
                  <th class="sortable" data-sort="amountInc">Amount inc.</th>
                  <th class="sortable" data-sort="amountEx">Amount ex.</th>
                  <th class="sortable" data-sort="status">Invoice status</th>
                  <th class="sortable" data-sort="type">Type</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="invoicesBody"></tbody>
            </table>
          </div>

          <div class="dt-pagination">
            <span><strong id="fromCount">1</strong> To <strong id="toCount">25</strong> - <strong id="totalCount">25</strong> Total items</span>
            <div class="page-nav">
              <button type="button" id="prevPageBtn" aria-label="Previous page">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <button type="button" id="nextPageBtn" aria-label="Next page">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div class="collapse-btn left" id="sidebarCollapseBtn">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
  </div>

</div>

<script>
(function(){
  'use strict';

  /* ---------------- Sidebar navigation (data-driven: accordion when expanded, flyout when collapsed) ---------------- */
  var NAV_ICONS = {
    dashboard:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
    orders:'<circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h2l2.4 12.2a2 2 0 0 0 2 1.6h8.8a2 2 0 0 0 2-1.6L21 7H6"/>',
    collections:'<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/>',
    crm:'<path d="M4 20V10M12 20V4M20 20v-7"/>',
    invoices:'<path d="M6 3h12v16l-2-1.3-2 1.3-2-1.3-2 1.3-2-1.3-2 1.3V3Z"/><path d="M9 8h6M9 12h6M9 16h3"/>',
    downloads:'<path d="M12 3v12m0 0-4-4m4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>',
    services:'<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76Z"/>',
    reports:'<path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/><path d="M9 12h6M9 16h6M9 8h2"/>',
    users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',
    settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1Z"/>',
    export:'<path d="M12 21V9m0 0-4 4m4-4 4 4"/><path d="M4 7V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>',
    bug:'<path d="M12 2 4 5v6c0 5 3.4 8.7 8 11 4.6-2.3 8-6 8-11V5l-8-3Z"/><path d="M12 8v5M12 16h.01"/>',
    chevron:'<path d="m6 9 6 6 6-6"/>'
  };

  var NAV_DATA = [
    { label:'Dashboard', icon:'dashboard', href:'dashboard.html' },
    { label:'Collections', icon:'collections', badge:{text:'5', color:'green'}, children:[
      { label:'Collection overview', href:'#' },
      { label:'Collection archive', href:'#' },
      { label:'Add new collection', href:'#' },
      { group:'Models', children:[
        { label:'Model overview', href:'#' }, { label:'Model archive', href:'#' }, { label:'Add new model', href:'#' }
      ]},
      { group:'Styles', children:[
        { label:'Style overview', href:'#' }, { label:'Style archive', href:'#' }, { label:'Add new Style', href:'#' }
      ]},
      { group:'Products', children:[
        { label:'Product overview', href:'#' }, { label:'Inventory', href:'#' }, { label:'Product archive', href:'#' }, { label:'Add new product', href:'#' }
      ]},
      { group:'Parts', children:[
        { label:'Parts overview', href:'#' }, { label:'Parts archive', href:'#' }, { label:'Add new part', href:'#' }
      ]},
      { group:'Fabrics', children:[
        { label:'Fabric collection overview', href:'#' }, { label:'Fabric collection archive', href:'#' }, { label:'Add fabric collection', href:'#' }
      ]},
      { group:'Options', children:[
        { label:'Options overview', href:'#' }, { label:'Options archive', href:'#' }, { label:'Add options', href:'#' }
      ]},
      { group:'Properties', children:[
        { label:'Property overview', href:'#' }, { label:'Property archive', href:'#' }, { label:'Add new property', href:'#' }
      ]}
    ]},
    { label:'Orders', icon:'orders', children:[
      { label:'Orders', href:'orders-overview.html' },
      { label:'Quotes', href:'quotes-overview.html' },
      { label:'Packaging label', href:'packaging-label.html' },
      { label:'Internal packaging label', href:'internal-packaging-label.html' }
    ]},
    { label:'Invoices', icon:'invoices', badge:{text:'8', color:'green'}, open:true, children:[
      { label:'Invoices', href:'invoices.html', active:true },
      { label:'Draft Invoices', href:'draft-invoices.html' },
      { label:'Invoice layout', href:'invoice-layout.html' },
      { label:'Draft Invoice Logs', href:'draft-invoice-logs.html' },
    ]},
    { label:'Services', icon:'services', children:[
      { label:'Service requests', href:'#' },
      { label:'Subjects', href:'#' },
      { label:'Solutions', href:'#' },
      { label:'Exchange', href:'#' },
      { label:'Exchange Logs', href:'#' }
    ]},
    { label:'CRM & Exact', icon:'crm', badge:{dot:true, color:'green'}, children:[
      { label:'Dealers', href:'#' },
      { label:'Dealer points', href:'#' },
      { label:'Dealer dashboard', href:'#' },
      { label:'Dealer profile', href:'#' },
      { label:'Billing Accounts', href:'#' },
      { group:'Suppliers', children:[
        { label:'Supplier overview', href:'#' }, { label:'Supplier archive', href:'#' }, { label:'Add new supplier', href:'#' }
      ]},
      { label:'Exact Logs', href:'#' },
      { label:'Exact Retries', href:'#', badge:{text:'117', color:'green'} },
      { label:'Exact CRM updates', href:'#', badge:{text:'1', color:'green'} },
      { group:'Countries', children:[
        { label:'Countries', href:'#' }, { label:'Add new country', href:'#' }
      ]}
    ]},
    { label:'System Users', icon:'users', href:'#', badge:{text:'5', color:'green'} },
    { label:'Downloads', icon:'downloads', children:[
      { label:'Downloads overview', href:'#' },
      { label:'Add new category', href:'#' }
    ]},
    { label:'Exports', icon:'export', href:'#' },
    { label:'Reports', icon:'reports', href:'#' },
    { label:'Settings', icon:'settings', badge:{dot:true, color:'green'}, children:[
      { label:'Account Setting', href:'#' },
      { group:'Emails', children:[
        { label:'Email overview', href:'#' }, { label:'Email logs', href:'#' }
      ]},
      { group:'Languages', children:[
        { label:'Localization overview', href:'#' }, { label:'Language overview', href:'#' }, { label:'Localization label', href:'#' }, { label:'Add new language', href:'#' }
      ]},
      { label:'Terms', href:'#' },
      { label:'Disclaimer', href:'#' },
      { label:'Work form item', href:'#' }
    ]},
    { label:'Report Bug', icon:'bug', href:'#' }
  ];

  function svgIcon(name, cls){
    return '<svg class="' + (cls || 'icon') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">' + NAV_ICONS[name] + '</svg>';
  }

  function badgeHTML(badge, small){
    if(!badge) return '';
    var cls = 'badge ' + (badge.color || 'yellow') + (small ? ' small' : '');
    if(badge.dot) return '<span class="' + cls + '" style="width:9px;height:9px;min-width:0;padding:0;"></span>';
    return '<span class="' + cls + '">' + badge.text + '</span>';
  }

  function leafHTML(item, depth){
    var cls = 'nav-item ' + (depth === 2 ? 'subsub' : 'sub') + (item.active ? ' active' : '');
    return '<a class="' + cls + '" href="' + item.href + '" data-nav-leaf="1">' +
      '<span class="label">' + item.label + '</span>' + badgeHTML(item.badge, true) +
      '</a>';
  }

  function childrenHTML(children, depth){
    return children.map(function(c){
      if(c.group){
        return '<div class="nav-subgroup-label">' + c.group + '</div>' + childrenHTML(c.children, 2);
      }
      return leafHTML(c, depth);
    }).join('');
  }

  function itemHTML(item, idx){
    var badgeCls = item.badge ? (' has-badge badge-' + (item.badge.color || 'yellow')) : '';
    if(!item.children){
      var cls = 'nav-item' + badgeCls + (item.active ? ' active' : '');
      return '<a class="' + cls + '" href="' + item.href + '" data-nav-idx="' + idx + '" title="' + item.label + '">' +
        svgIcon(item.icon) + '<span class="label">' + item.label + '</span>' + badgeHTML(item.badge) +
        '</a>';
    }
    return '<div class="nav-group' + (item.open ? ' open' : '') + '" data-nav-idx="' + idx + '">' +
      '<a class="nav-item group-header' + badgeCls + '" href="#" data-nav-idx="' + idx + '" title="' + item.label + '">' +
        svgIcon(item.icon) + '<span class="label">' + item.label + '</span>' + badgeHTML(item.badge) +
        svgIcon('chevron', 'chevron-mini') +
      '</a>' +
      '<div class="nav-sublist">' + childrenHTML(item.children, 1) + '</div>' +
    '</div>';
  }

  function renderNav(){
    var html = NAV_DATA.map(itemHTML).join('');
    document.getElementById('navList').innerHTML = html;
  }

  var flyout = document.getElementById('sidebarFlyout');
  var flyoutCloseTimer = null;

  function hideFlyout(){
    flyout.classList.remove('show');
  }

  function showFlyoutFor(navItemEl, idx){
    clearTimeout(flyoutCloseTimer);
    var item = NAV_DATA[idx];
    var html = '<div class="flyout-header">' + item.label + '</div>';
    if(item.children) html += '<div class="flyout-list">' + childrenHTML(item.children, 1) + '</div>';
    flyout.innerHTML = html;
    var rect = navItemEl.getBoundingClientRect();
    flyout.style.left = (rect.right + 8) + 'px';
    flyout.style.top = Math.max(8, Math.min(rect.top, window.innerHeight - 60)) + 'px';
    flyout.classList.add('show');
  }

  function scheduleHideFlyout(){
    clearTimeout(flyoutCloseTimer);
    flyoutCloseTimer = setTimeout(hideFlyout, 150);
  }

  renderNav();

  var navList = document.getElementById('navList');
  navList.addEventListener('click', function(e){
    var header = e.target.closest('.group-header');
    if(header){
      e.preventDefault();
      if(sidebar.classList.contains('collapsed')){
        var idx = Number(header.getAttribute('data-nav-idx'));
        if(flyout.classList.contains('show') && flyout.dataset.forIdx === String(idx)){ hideFlyout(); }
        else { flyout.dataset.forIdx = String(idx); showFlyoutFor(header, idx); }
      } else {
        header.closest('.nav-group').classList.toggle('open');
      }
      return;
    }
    var leaf = e.target.closest('[data-nav-leaf]');
    if(leaf && (!leaf.getAttribute('href') || leaf.getAttribute('href') === '#')){
      e.preventDefault();
    }
  });
  navList.addEventListener('mouseover', function(e){
    if(!sidebar.classList.contains('collapsed')) return;
    var el = e.target.closest('[data-nav-idx]');
    if(!el) return;
    var idx = Number(el.getAttribute('data-nav-idx'));
    if(!NAV_DATA[idx].children) return;
    flyout.dataset.forIdx = String(idx);
    showFlyoutFor(el, idx);
  });
  navList.addEventListener('mouseout', function(e){
    if(!sidebar.classList.contains('collapsed')) return;
    if(e.relatedTarget && flyout.contains(e.relatedTarget)) return;
    scheduleHideFlyout();
  });
  flyout.addEventListener('mouseover', function(){ clearTimeout(flyoutCloseTimer); });
  flyout.addEventListener('mouseout', function(e){
    if(e.relatedTarget && navList.contains(e.relatedTarget)) return;
    scheduleHideFlyout();
  });

  var CLEAR_ICON_SVG = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
  var openPanel = null;

  function closeOpenPanel(){
    if(!openPanel) return;
    openPanel.panel.hidden = true;

  function syncSelectDisplay(select){
    var wrap = select.closest('.select');
    if(!wrap) return;
    var display = wrap.querySelector('.select-display');
    if(display) display.textContent = select.selectedOptions[0] ? select.selectedOptions[0].textContent : '';
    wrap.classList.toggle('has-value', select.selectedIndex > 0);
    var panel = wrap.querySelector('.select-options-panel');
    if(panel){
      panel.querySelectorAll('.select-option').forEach(function(opt, i){
        opt.classList.toggle('selected', i === select.selectedIndex);
      });
    }
  }

  function enhanceSelects(root){
    (root || document).querySelectorAll('.select').forEach(function(wrap){
      var select = wrap.querySelector('select.field-select');
      if(!select || wrap.querySelector('.select-trigger')) return;

      var trigger = document.createElement('button');
      trigger.type = 'button';
      trigger.className = 'select-trigger';
      var display = document.createElement('span');
      display.className = 'select-display';
      trigger.appendChild(display);
      wrap.insertBefore(trigger, select);

      var clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.className = 'select-clear';
      clearBtn.setAttribute('aria-label', 'Reset selection');
      clearBtn.innerHTML = CLEAR_ICON_SVG;
      var chevron = wrap.querySelector('.chevron');
      wrap.insertBefore(clearBtn, chevron || null);

      var panel = document.createElement('div');
      panel.className = 'select-options-panel';
      panel.hidden = true;
      Array.prototype.forEach.call(select.options, function(opt, i){
        var row = document.createElement('div');
        row.className = 'select-option';
        row.textContent = opt.textContent;
        row.dataset.index = i;
        panel.appendChild(row);
      });
      wrap.appendChild(panel);

      trigger.addEventListener('click', function(e){
        e.stopPropagation();
        if(select.disabled) return;
        if(openPanel && openPanel.panel === panel){ closeOpenPanel(); return; }
        closeOpenPanel();
        panel.hidden = false;
        wrap.classList.add('open');
        openPanel = { panel: panel, wrap: wrap };
      });

      panel.addEventListener('click', function(e){
        e.stopPropagation();
        var row = e.target.closest('.select-option');
        if(!row) return;
        select.selectedIndex = parseInt(row.dataset.index, 10);
        syncSelectDisplay(select);
        closeOpenPanel();
        select.dispatchEvent(new Event('change', { bubbles: true }));
      });

      syncSelectDisplay(select);
    });
  }

  /* ---------------- Shared data-table controller ---------------- */
  function initDataTable(opts){
    var state = { page: 1, pageSize: Number(opts.pageSizeSelect.value), sortKey: opts.defaultSortKey || null, sortDir: opts.defaultSortDir || 1, query: '' };
    if(state.sortKey){
      opts.headerEls.forEach(function(h){
        if(h.getAttribute('data-sort') === state.sortKey) h.classList.add(state.sortDir === 1 ? 'sort-asc' : 'sort-desc');
      });
    }

    function getFiltered(){
      var rows = opts.data.filter(function(item){ return opts.filterFn(item, state.query); });
      if(state.sortKey){
        rows = rows.slice().sort(function(a, b){
          var av = opts.sortValue(a, state.sortKey), bv = opts.sortValue(b, state.sortKey);
          if(av < bv) return -1 * state.sortDir;
          if(av > bv) return 1 * state.sortDir;
          return 0;
        });
      }
      return rows;
    }

    function render(){
      var filtered = getFiltered();
      var total = filtered.length;
      var pages = Math.max(1, Math.ceil(total / state.pageSize));
      if(state.page > pages) state.page = pages;
      var startIdx = (state.page - 1) * state.pageSize;
      var pageRows = filtered.slice(startIdx, startIdx + state.pageSize);
      opts.tbody.innerHTML = pageRows.length
        ? pageRows.map(function(item, i){ return opts.renderRow(item, startIdx + i); }).join('')
        : '<tr class="dt-no-results"><td colspan="' + opts.colCount + '">No results found.</td></tr>';
      var toIdx = total === 0 ? 0 : Math.min(startIdx + state.pageSize, total);
      opts.fromEl.textContent = total === 0 ? 0 : startIdx + 1;
      opts.toEl.textContent = toIdx;
      opts.totalEl.textContent = total;
      opts.prevBtn.disabled = state.page <= 1;
      opts.nextBtn.disabled = state.page >= pages;
      if(opts.afterRender) opts.afterRender(pageRows);
    }

    opts.searchInput.addEventListener('input', function(){
      state.query = this.value.trim().toLowerCase();
      state.page = 1;
      render();
    });
    opts.pageSizeSelect.addEventListener('change', function(){
      state.pageSize = Number(this.value);
      state.page = 1;
      render();
    });
    opts.prevBtn.addEventListener('click', function(){ if(state.page > 1){ state.page--; render(); } });
    opts.nextBtn.addEventListener('click', function(){ state.page++; render(); });
    if(opts.refreshBtn){
      opts.refreshBtn.addEventListener('click', function(){
        var btn = this;
        btn.classList.add('spinning');
        setTimeout(function(){ btn.classList.remove('spinning'); render(); }, 450);
      });
    }
    opts.headerEls.forEach(function(th){
      th.addEventListener('click', function(){
        var key = th.getAttribute('data-sort');
        if(state.sortKey === key){ state.sortDir *= -1; } else { state.sortKey = key; state.sortDir = 1; }
        opts.headerEls.forEach(function(h){ h.classList.remove('sort-asc', 'sort-desc'); });
        th.classList.add(state.sortDir === 1 ? 'sort-asc' : 'sort-desc');
        render();
      });
    });

    render();
    return { render: render, state: state };
  }

  var invoicesTbody = document.getElementById('invoicesBody');

  var dealerFilter = document.getElementById('dealerFilter');
  var statusFilter = document.getElementById('statusFilter');
  var selectAllCheck = document.getElementById('selectAllCheck');

  var invoicesDT = initDataTable({
    data: INVOICES,
    colCount: 10,
    tbody: invoicesTbody,
    searchInput: document.getElementById('searchInput'),
    pageSizeSelect: document.getElementById('pageSizeSelect'),
    refreshBtn: document.getElementById('refreshBtn'),
    prevBtn: document.getElementById('prevPageBtn'),
    nextBtn: document.getElementById('nextPageBtn'),
    fromEl: document.getElementById('fromCount'),
    toEl: document.getElementById('toCount'),
    totalEl: document.getElementById('totalCount'),
    headerEls: Array.prototype.slice.call(document.querySelectorAll('#invoicesTable thead th.sortable')),
    filterFn: function(inv, query){
      if(creditCheck.checked && inv.type !== 'Credit invoice') return false;
      if(fromDateInput.value && inv.date < fromDateInput.value) return false;
      if(toDateInput.value && inv.date > toDateInput.value) return false;
      if(dealerFilter.value && inv.dealer !== dealerFilter.value) return false;
      if(statusFilter.value && inv.status !== statusFilter.value) return false;
      if(!query) return true;
      return (inv.number + ' ' + inv.dealer + ' ' + inv.status + ' ' + inv.type).toLowerCase().indexOf(query) !== -1;
    },
    sortValue: function(inv, key){
      if(key === 'amountInc' || key === 'amountEx') return inv[key];
      return String(inv[key]).toLowerCase();
    },

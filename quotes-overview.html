<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 40 40%27%3E%3Ccircle cx=%2720%27 cy=%2720%27 r=%2718%27 fill=%27%231a1a1a%27 stroke=%27%23c9a860%27 stroke-width=%273%27/%3E%3Ctext x=%2720%27 y=%2726%27 text-anchor=%27middle%27 font-family=%27Georgia,serif%27 font-weight=%27700%27 font-size=%2715%27 fill=%27%23ffffff%27%3EUS%3C/text%3E%3C/svg%3E">
<title>UrbanSofa &mdash; Quotes</title>
<style>
  :root{
    --sidebar-bg:#f0ebe3;
    --sidebar-active-bg:#c6b8a1;
    --sidebar-border:#e6e1d5;
    --green:#597671;
    --green-dark:#46615c;
    --green-pale-bg:#e4eae9;
    --tan:#b08a3e;
    --tan-pale-bg:#f2e9d3;
    --tan-line:#c9a860;
    --primary:#866E52;
    --primary-dark:#6b5741;
    --primary-pale-bg:#f0ece6;
    --red:#e2544c;
    --yellow-badge:#eab445;
    --border:#e3e0d8;
    --border-dashed:#d8cba0;
    --text-dark:#293224;
    --text-muted:#738297;
    --text-light-muted:#a1b1c7;
    --bg-page:#ffffff;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:'Source Sans Pro',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text-dark);
    background:var(--bg-page);
    font-size:14px;
    line-height:1.43;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;}
  .app{
    display:flex;
    height:100vh;
    width:100%;
    position:relative;
    overflow:hidden;
  }

  /* ---------------- Sidebar ---------------- */
  .sidebar{
    width:250px;
    flex:0 0 250px;
    background:var(--sidebar-bg);
    border-right:1px solid var(--sidebar-border);
    padding:26px 18px 18px;
    display:flex;
    flex-direction:column;
    transition:width .2s ease, flex-basis .2s ease, padding .2s ease;
    overflow:hidden;
  }
  .sidebar.collapsed{
    width:78px;
    flex:0 0 78px;
    padding:26px 14px;
  }
  .logo{
    padding:0 6px 26px;
  }
  .sidebar.collapsed .logo{padding:0 0 22px;}
  .logo-full{
    display:flex;
    align-items:center;
  }
  .logo-full .logo-svg{
    width:100%;
    max-width:170px;
    height:auto;
    display:block;
    border-radius:10px;
  }
  .logo-mini{
    display:none;
    width:38px;
    height:38px;
    border-radius:50%;
    background:#1a1a1a;
    border:3px solid #c9a860;
    color:#fff;
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;
    font-size:13px;
    align-items:center;
    justify-content:center;
    margin:0 auto;
  }
  .sidebar.collapsed .logo-full{display:none;}
  .sidebar.collapsed .logo-mini{display:flex;}
  nav.nav-list{
    display:flex;
    flex-direction:column;
    gap:2px;
    margin-top:6px;
    flex:1;
    min-height:0;
    overflow-y:auto;
  }
  nav.nav-list::-webkit-scrollbar{width:6px;}
  nav.nav-list::-webkit-scrollbar-thumb{background:var(--sidebar-active-bg);border-radius:3px;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 12px;
    border-radius:8px;
    color:#585544;
    text-decoration:none;
    font-size:14.5px;
    position:relative;
    cursor:pointer;
    white-space:nowrap;
  }
  .nav-item:hover{
    background:#e9e4d6;
  }
  .nav-item.active{
    background:var(--sidebar-active-bg);
    color:#3d3624;
    font-weight:600;
  }
  .nav-item .icon{
    width:19px;
    height:19px;
    flex:0 0 19px;
    color:inherit;
  }
  .nav-item .label{
    flex:1;
  }
  .badge{
    min-width:18px;
    height:18px;
    padding:0 5px;
    border-radius:9px;
    color:#fff;
    font-size:11px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .badge.yellow{background:var(--yellow-badge);}
  .badge.red{background:var(--red);}
  .badge.green{background:var(--green);}

  .sidebar.collapsed .nav-item{justify-content:center;padding:11px 0;}
  .sidebar.collapsed .nav-item .label,
  .sidebar.collapsed .nav-item .badge{display:none;}
  .sidebar.collapsed .nav-item.has-badge::after{
    content:'';
    position:absolute;
    top:8px;
    right:16px;
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--yellow-badge);
  }
  .sidebar.collapsed .nav-item.has-badge.badge-red::after{background:var(--red);}
  .sidebar.collapsed .nav-item.has-badge.badge-green::after{background:var(--green);}

  /* ---- Nav groups / accordion / flyout ---- */
  .nav-item .chevron-mini{
    width:15px;
    height:15px;
    flex:0 0 15px;
    color:#93876c;
    transition:transform .15s ease;
  }
  .nav-group.open > .nav-item .chevron-mini{transform:rotate(180deg);}
  .nav-sublist{
    display:flex;
    flex-direction:column;
    gap:1px;
    max-height:0;
    overflow:hidden;
    transition:max-height .22s ease;
  }
  .nav-group.open > .nav-sublist{
    max-height:800px;
    padding:2px 0 4px;
  }
  .nav-item.sub{
    padding:7px 12px 7px 38px;
    font-size:13.3px;
    border-radius:6px;
  }
  .nav-item.subsub{padding-left:50px;}
  .nav-subgroup-label{
    padding:7px 12px 3px 38px;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--text-light-muted);
    cursor:pointer;
    user-select:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
  }
  .nav-subgroup-label:hover{color:var(--text-dark);}
  .nav-subgroup-label .chevron-mini2{
    width:11px;
    height:11px;
    flex:0 0 11px;
    color:var(--text-light-muted);
    transition:transform .15s ease;
  }
  .nav-subgroup.open > .nav-subgroup-label .chevron-mini2{transform:rotate(180deg);}
  .nav-subgroup-list{
    display:flex;
    flex-direction:column;
    gap:1px;
    max-height:0;
    overflow:hidden;
    transition:max-height .18s ease;
  }
  .nav-subgroup.open > .nav-subgroup-list{max-height:400px;}
  .badge.small{
    min-width:15px;
    height:15px;
    padding:0 4px;
    font-size:9.5px;
    margin-left:6px;
    flex:0 0 auto;
  }
  .sidebar.collapsed .nav-sublist,
  .sidebar.collapsed .nav-subgroup-label,
  .sidebar.collapsed .chevron-mini{display:none !important;}

  #sidebarFlyout{
    position:fixed;
    z-index:300;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 10px 28px rgba(41,50,36,.16);
    padding:8px;
    min-width:216px;
    max-width:290px;
    max-height:76vh;
    overflow-y:auto;
    display:none;
  }
  #sidebarFlyout.show{display:block;}
  .flyout-header{
    padding:6px 10px 8px;
    font-size:13.5px;
    font-weight:700;
    color:var(--text-dark);
    border-bottom:1px solid var(--border);
    margin-bottom:4px;
    white-space:nowrap;
  }
  #sidebarFlyout .nav-item.sub{padding-left:12px;}
  #sidebarFlyout .nav-item.subsub{padding-left:24px;}
  #sidebarFlyout .nav-subgroup-label{padding-left:12px;}

  /* ---------------- Main / Topbar ---------------- */
  .main-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .topbar{
    height:64px;
    flex:0 0 64px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 28px;
    border-bottom:1px solid var(--border);
    gap:16px;
  }
  .breadcrumb{
    font-size:15px;
    white-space:nowrap;
  }
  .breadcrumb .muted{
    color:var(--text-muted);
  }
  .breadcrumb .current{
    color:var(--text-dark);
    font-weight:700;
    margin-left:6px;
  }
  .topbar-right{
    display:flex;
    align-items:center;
    gap:16px;
    min-width:0;
  }
  .exact-status{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12.5px;
    color:var(--text-muted);
    white-space:nowrap;
  }
  .exact-status .exact-check{
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--green);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 16px;
  }
  .exact-status .exact-check .icon{width:9px;height:9px;}
  .exact-status strong{color:var(--text-dark);font-weight:700;}
  .exact-status .exact-sub{color:var(--text-light-muted);}
  .bell-wrap{
    position:relative;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#f4f2ec;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#6b6a5f;
    border:none;
    cursor:pointer;
    flex:0 0 34px;
  }
  .bell-wrap .icon{width:17px;height:17px;}
  .bell-badge{
    position:absolute;
    top:-5px;
    right:-8px;
    background:var(--red);
    color:#fff;
    font-size:9.5px;
    font-weight:700;
    padding:2px 4px;
    border-radius:9px;
    line-height:1;
  }
  .divider-v{
    width:1px;
    height:28px;
    background:var(--border);
    flex:0 0 1px;
  }
  .user-menu-wrap{position:relative;}
  .user-chip{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    background:none;
    border:none;
    white-space:nowrap;
  }
  .avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    background:linear-gradient(135deg,#e3b6a4,#c98b7b);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:700;
    flex:0 0 34px;
  }
  .user-chip .name{
    font-weight:600;
    font-size:14.5px;
    color:var(--text-dark);
  }
  .user-chip .icon{width:14px;height:14px;color:#8c8878;transition:transform .15s ease;}
  .user-chip[aria-expanded="true"] .icon{transform:rotate(180deg);}
  .dropdown-menu{
    position:absolute;
    top:calc(100% + 12px);
    right:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.14);
    padding:6px;
    min-width:170px;
    z-index:30;
  }
  .dropdown-menu[hidden]{display:none;}
  .dropdown-menu button{
    width:100%;
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 10px;
    border:none;
    background:none;
    border-radius:7px;
    font-size:13.5px;
    color:var(--text-dark);
    cursor:pointer;
    text-align:left;
  }
  .dropdown-menu button:hover{background:var(--sidebar-bg);}
  .dropdown-menu .icon{width:15px;height:15px;color:var(--text-muted);flex:0 0 15px;}

  /* Field grid */
  .field-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:28px;
    margin-bottom:22px;
  }
  .field label.field-label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13.5px;
    font-weight:600;
    color:#3a3830;
    margin-bottom:8px;
  }
  .field label.field-label .req{color:var(--red);}
  .field label.field-label .icon{width:14px;height:14px;color:#b7b3a4;}
  .input, .select{
    width:100%;
    height:42px;
    border:1px solid var(--border);
    border-radius:8px;
    padding:0 10px 0 14px;
    font-size:14px;
    color:#4a473c;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:var(--shadow-sm);
    position:relative;
    gap:6px;
  }
  .input.disabled, .select.disabled{
    color:#b9b6ab;
    background:#fbfaf7;
  }
  .select .chevron{width:14px;height:14px;color:#8c8878;flex:0 0 14px;pointer-events:none;transition:transform .15s ease;}
  .select.open .chevron{transform:rotate(180deg);}
  .select select.field-select{
    position:absolute;
    width:1px;
    height:1px;
    padding:0;
    margin:0;
    overflow:hidden;
    clip:rect(0,0,0,0);
    border:0;
    opacity:0;
  }
  .select-trigger{
    flex:1;
    min-width:0;
    height:100%;
    border:none;
    background:none;
    padding:0;
    margin:0;
    text-align:left;
    font:inherit;
    color:#4a473c;
    cursor:pointer;
    display:flex;
    align-items:center;
  }
  .select-trigger:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px;}
  .select.disabled .select-trigger{color:#b9b6ab;cursor:not-allowed;}
  .select-display{
    width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .select-clear{
    display:none;
    align-items:center;
    justify-content:center;
    width:16px;
    height:16px;
    border-radius:50%;
    border:none;
    background:#ece7db;
    color:#8c8878;
    cursor:pointer;
    flex:0 0 16px;
    padding:0;
    line-height:0;
  }
  .select-clear .icon{width:8px;height:8px;display:block;}
  .select-clear:hover{background:var(--red);color:#fff;}
  .select.has-value .select-clear{display:flex;}
  .select.disabled .select-clear{display:none !important;}
  .select-options-panel{
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    right:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:8px;
    box-shadow:0 12px 28px rgba(41,50,36,.14);
    padding:6px;
    max-height:248px;
    overflow-y:auto;
    z-index:40;
  }
  .select-options-panel[hidden]{display:none;}
  .select-option{
    padding:9px 12px;
    border-radius:6px;
    font-size:14px;
    font-family:inherit;
    color:#4a473c;
    cursor:pointer;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .select-option:hover{background:var(--sidebar-bg);}
  .select-option.selected{background:var(--green-pale-bg);color:var(--green);font-weight:600;}
  input.text-input{
    border:none;
    outline:none;
    background:transparent;
    font-size:14px;
    color:#4a473c;
    width:100%;
    height:100%;
    font-family:inherit;
  }
  input.text-input::placeholder{color:#9a978c;}
  input.text-input:disabled{color:#b9b6ab;}
  .collapse-btn{
    position:absolute;
    bottom:70px;
    width:26px;
    height:26px;
    border-radius:50%;
    background:#fff;
    border:1px solid var(--border);
    box-shadow:0 1px 3px rgba(0,0,0,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#8c8878;
    cursor:pointer;
    transition:left .22s ease;
    z-index:5;
  }
  .collapse-btn:hover{color:var(--green);}
  .collapse-btn.left{left:238px;}
  .collapse-btn .icon{width:13px;height:13px;transition:transform .2s ease;}
  .collapse-btn.flipped .icon{transform:rotate(180deg);}
  .app.sidebar-collapsed .collapse-btn.left{left:66px;}

  /* ---------------- Shared data-table component ---------------- */
  .status-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:4px 10px;
    border-radius:12px;
    font-size:12px;
    font-weight:600;
    white-space:nowrap;
  }
  .status-badge .icon{width:11px;height:11px;}

  .row-actions{display:flex;align-items:center;gap:8px;}
  .row-action-btn{
    width:26px;
    height:26px;
    border-radius:6px;
    border:none;
    background:none;
    color:var(--text-muted);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .row-action-btn:hover{background:var(--sidebar-bg);color:var(--green);}
  .row-action-btn .icon{width:14px;height:14px;}
  .row-action-btn.spinning .icon{animation:spin .7s linear;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  /* ---------------- Content area ---------------- */
  .content-area{
    flex:1;
    display:flex;
    min-height:0;
  }



  .dt-main{
    flex:1;
    min-width:0;
    padding:26px 34px 40px;
    overflow-y:auto;
  }
  .dt-page-title{font-size:18px;font-weight:700;color:var(--text-dark);margin:0 0 20px;}
  .dt-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:22px 24px 20px;}
  .dt-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:16px;}
  .dt-card-header h2{font-size:15px;font-weight:700;color:var(--text-dark);margin:0;}
  .dt-add-btn{
    display:flex;align-items:center;gap:8px;
    background:var(--green);color:#fff;border:none;border-radius:8px;
    padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;
    text-decoration:none;
  }
  .dt-add-btn:hover{background:var(--green-dark);}
  .dt-add-btn .icon{width:15px;height:15px;}

  .dt-toolbar{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
  .dt-spacer{flex:1;}

  /* Search: secondary icon button, expands into an input on click */
  .search-toggle{
    display:flex;align-items:center;height:36px;border-radius:7px;background:#fff;
    border:1px solid var(--border);overflow:hidden;transition:width .2s ease, border-color .15s ease;
    width:36px;flex:0 0 auto;
  }
  .search-toggle:hover{border-color:var(--primary);}
  .search-toggle.expanded{width:240px;}
  .search-toggle-btn{
    width:36px;height:36px;flex:0 0 36px;border:none;background:none;color:var(--text-muted);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .search-toggle.expanded .search-toggle-btn{color:var(--primary);}
  .search-toggle-btn .icon{width:16px;height:16px;}
  .search-toggle input{
    flex:1;min-width:0;border:none;outline:none;font-size:13px;font-family:inherit;
    color:var(--text-dark);background:none;padding:0;width:0;opacity:0;transition:opacity .15s ease;
  }
  .search-toggle.expanded input{width:auto;opacity:1;padding-right:12px;}

  .icon-only-btn{
    position:relative;width:36px;height:36px;border-radius:7px;border:1px solid var(--border);
    background:#fff;color:var(--text-muted);display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex:0 0 36px;
  }
  .icon-only-btn:hover{background:var(--sidebar-bg);color:var(--primary);border-color:var(--primary);}
  .icon-only-btn .icon{width:16px;height:16px;}
  .date-range-chip{
    display:none;align-items:center;gap:6px;height:36px;padding:0 6px 0 12px;
    border:1px solid var(--primary);border-radius:7px;background:var(--primary-pale-bg);
    color:var(--primary);font-size:12.5px;font-weight:600;white-space:nowrap;
  }
  .date-range-chip.visible{display:flex;}
  .date-range-chip button{
    width:20px;height:20px;border:none;background:none;color:var(--primary);cursor:pointer;
    display:flex;align-items:center;justify-content:center;border-radius:50%;
  }
  .date-range-chip button:hover{background:rgba(134,110,82,.15);}
  .date-range-chip .icon{width:11px;height:11px;}

  /* ---------------- Date range picker popover (same component as Orders overview) ---------------- */
  .date-range-popover{
    position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1px solid var(--border);
    border-radius:12px;box-shadow:0 16px 40px rgba(41,50,36,.16);z-index:50;display:flex;
  }
  .date-range-popover[hidden]{display:none;}
  .drp-presets{
    display:flex;flex-direction:column;gap:2px;padding:12px;border-right:1px solid var(--border);
    background:var(--sidebar-bg);min-width:140px;border-radius:12px 0 0 12px;
  }
  .drp-presets button{
    text-align:left;border:none;background:none;padding:9px 10px;border-radius:7px;font-size:13px;
    color:var(--text-dark);cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .drp-presets button:hover{background:#fff;}
  .drp-calendar{padding:16px;width:280px;}
  .drp-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .drp-cal-header span{font-size:14px;font-weight:700;color:var(--text-dark);}
  .drp-nav{width:26px;height:26px;border-radius:6px;border:none;background:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .drp-nav:hover{background:var(--sidebar-bg);color:var(--primary);}
  .drp-nav .icon{width:14px;height:14px;}
  .drp-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:4px;}
  .drp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .drp-day{
    height:32px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-dark);
    cursor:pointer;border-radius:6px;background:none;border:none;font-family:inherit;position:relative;
  }
  .drp-day.other-month{color:var(--text-light-muted);}
  .drp-day:hover{background:var(--sidebar-bg);}
  .drp-day.today{font-weight:700;box-shadow:inset 0 0 0 1.5px var(--primary);}
  .drp-day.in-range{background:var(--primary-pale-bg);border-radius:0;}
  .drp-day.range-start, .drp-day.range-end{background:var(--primary);color:#fff;font-weight:700;}
  .drp-day.range-start:hover, .drp-day.range-end:hover{background:var(--primary-dark);}
  .drp-day.range-start{border-radius:6px 0 0 6px;}
  .drp-day.range-end{border-radius:0 6px 6px 0;}
  .drp-day.range-start.range-end{border-radius:6px;}
  .drp-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);gap:10px;}
  .drp-range-label{font-size:12px;color:var(--text-muted);}
  .drp-footer-actions{display:flex;gap:8px;flex:0 0 auto;}
  .drp-footer-actions button{height:32px;padding:0 14px;border-radius:7px;font-size:12.5px;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
  .drp-cancel{background:none;color:var(--text-muted);}
  .drp-cancel:hover{color:var(--red);}
  .drp-apply{background:var(--primary);color:#fff;}
  .drp-apply:hover{background:var(--primary-dark);}

  .dt-bulk{display:flex;align-items:center;gap:0;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .dt-bulk .select{width:150px;height:34px;border:none;border-radius:0;box-shadow:none;padding:0 8px 0 12px;}
  .dt-bulk-apply-btn{
    height:34px;padding:0 16px;border:none;background:var(--green);color:#fff;
    font-size:13px;font-weight:600;cursor:pointer;border-left:1px solid rgba(255,255,255,.2);white-space:nowrap;
  }
  .dt-bulk-apply-btn:hover{background:var(--green-dark);}

  .dt-table-wrap{overflow-x:auto;}
  table.dt-table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .dt-table thead th{
    text-align:left;padding:11px 14px;color:var(--text-muted);font-weight:600;
    border-bottom:2px solid var(--border);white-space:nowrap;font-size:12.5px;
    text-transform:uppercase;letter-spacing:.03em;
  }
  .dt-table thead th.sortable{cursor:pointer;user-select:none;}
  .dt-table thead th.sortable:hover{color:var(--green);}
  .dt-sort-icons{display:inline-flex;flex-direction:column;margin-left:5px;vertical-align:middle;gap:1px;}
  .dt-sort-icons .icon{width:9px;height:9px;color:#c8c4b6;display:block;}
  .dt-table thead th.sort-asc .dt-sort-icons .icon.up,
  .dt-table thead th.sort-desc .dt-sort-icons .icon.down{color:var(--green);}
  .dt-table tbody td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text-dark);vertical-align:middle;}
  .dt-table tbody tr:hover{background:var(--sidebar-bg);}
  .dt-table tbody tr.selected{background:var(--green-pale-bg);}
  .dt-table tbody tr:last-child td{border-bottom:none;}
  .dt-table a.dt-link{color:var(--green);text-decoration:none;font-weight:600;}
  .dt-table a.dt-link:hover{text-decoration:underline;}
  .dt-table input[type="checkbox"].dt-row-check{width:16px;height:16px;accent-color:var(--green);cursor:pointer;}
  .dt-muted{color:var(--text-light-muted);}
  .dt-amount{font-weight:600;color:var(--text-dark);white-space:nowrap;}

  .status-badge.status-open{background:#eef2f7;color:#5d6481;}
  .status-badge.status-partial{background:var(--tan-pale-bg);color:var(--tan);}
  .status-badge.status-paid{background:var(--green-pale-bg);color:var(--green);}
  .status-badge.status-credit{background:#fbe7e5;color:var(--red);}
  .status-badge.status-active{background:var(--green-pale-bg);color:var(--green);}
  .status-badge.status-expired{background:#fbe7e5;color:var(--red);}
  .status-badge.status-expiringsoon{background:var(--tan-pale-bg);color:var(--tan);}
  .status-badge.status-create{background:#eef2f7;color:#5d6481;}
  .status-badge.status-approve{background:var(--green-pale-bg);color:var(--green);}
  .status-badge.status-edit{background:var(--tan-pale-bg);color:var(--tan);}

  .dt-inline-edit{
    width:56px;height:30px;border:1px solid var(--border);border-radius:6px;
    padding:0 8px;font-size:13px;font-family:inherit;text-align:center;color:var(--text-dark);
  }
  .dt-inline-edit:focus{outline:none;border-color:var(--green);}

  /* ---------------- Pagination bar (same component as Orders overview) ---------------- */
  .pagination-bar{display:flex;align-items:center;justify-content:flex-end;gap:14px;margin-top:18px;font-size:13px;color:var(--text-muted);}
  .pagination-size{display:flex;align-items:center;gap:4px;}
  .pagination-size .select{width:auto;height:auto;border:none;box-shadow:none;background:none;padding:0;gap:4px;}
  .pagination-size .select-trigger{font-weight:700;font-size:13px;color:var(--text-dark);}
  .pagination-size .select-clear{display:none !important;}
  .pagination-size .chevron{width:12px;height:12px;color:var(--text-muted);}
  .pagination-size .select-options-panel{left:0;right:auto;min-width:70px;}
  .pagination-divider{width:1px;height:20px;background:var(--border);flex:0 0 1px;}
  .page-nav{display:flex;align-items:center;gap:8px;}
  .page-nav button{
    width:24px;height:24px;border-radius:50%;border:none;background:none;color:var(--text-muted);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .page-nav button:hover{color:var(--primary);}
  .page-nav button:disabled{opacity:.35;cursor:not-allowed;}
  .page-nav button .icon{width:12px;height:12px;}
  .page-number-bubble{
    width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;
  }
  .dt-no-results td{text-align:center;color:var(--text-muted);padding:30px !important;}

  .tooltip-wrap{position:relative;}
  .icon-only-btn[title]:hover::after,
  .row-action-btn[title]:hover::after{
    content:attr(title);
    position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:#293224;color:#fff;font-size:11px;font-weight:500;white-space:nowrap;
    padding:5px 9px;border-radius:6px;z-index:20;pointer-events:none;
  }
  .row-action-btn{position:relative;}

  @media (max-width:1000px){
    .dt-toolbar, .dt-filters-row{flex-direction:column;align-items:stretch;}
    .dt-search input{width:100%;}
  }
</style>
</head>

(function(){

      { label:'Orders', href:'orders-overview.html' },

      { label:'Invoice layout', href:'invoice-layout.html' },

    { label:'CRM & Exact', icon:'crm', badge:{dot:true, color:'green'}, children:[

      { group:'Suppliers', children:[

      ]},

      { group:'Countries', children:[

    { label:'Settings', icon:'settings', badge:{dot:true, color:'green'}, children:[

    { label:'Report Bug', icon:'bug', href:'#' }

  function svgIcon(name, cls){
    return '<svg class="' + (cls || 'icon') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">' + NAV_ICONS[name] + '</svg>';
  }

  function badgeHTML(badge, small){
    if(!badge) return '';
    var cls = 'badge ' + (badge.color || 'yellow') + (small ? ' small' : '');
    if(badge.dot) return '<span class="' + cls + '" style="width:9px;height:9px;min-width:0;padding:0;"></span>';
    return '<span class="' + cls + '">' + badge.text + '</span>';
  }

  function leafHTML(item, depth){
    var cls = 'nav-item ' + (depth === 2 ? 'subsub' : 'sub') + (item.active ? ' active' : '');
    return '<a class="' + cls + '" href="' + item.href + '" data-nav-leaf="1">' +
      '<span class="label">' + item.label + '</span>' + badgeHTML(item.badge, true) +
      '</a>';
  }

  function containsActive(children){
    return children.some(function(c){
      if(c.group) return containsActive(c.children);
      return !!c.active;
    });
  }

  function childrenHTML(children, depth){
    return children.map(function(c){
      if(c.group){
        var isOpen = containsActive(c.children);
        return '<div class="nav-subgroup' + (isOpen ? ' open' : '') + '">' +
          '<div class="nav-subgroup-label" data-subgroup-toggle="1">' +
            '<span>' + c.group + '</span>' + svgIcon('chevron', 'chevron-mini2') +
          '</div>' +
          '<div class="nav-subgroup-list">' + childrenHTML(c.children, 2) + '</div>' +
        '</div>';
      }
      return leafHTML(c, depth);
    }).join('');
  }

  function itemHTML(item, idx){
    var badgeCls = item.badge ? (' has-badge badge-' + (item.badge.color || 'yellow')) : '';
    if(!item.children){
      var cls = 'nav-item' + badgeCls + (item.active ? ' active' : '');
      return '<a class="' + cls + '" href="' + item.href + '" data-nav-idx="' + idx + '" title="' + item.label + '">' +
        svgIcon(item.icon) + '<span class="label">' + item.label + '</span>' + badgeHTML(item.badge) +
        '</a>';
    }
    var isOpen = item.open || containsActive(item.children);
    return '<div class="nav-group' + (isOpen ? ' open' : '') + '" data-nav-idx="' + idx + '">' +
      '<a class="nav-item group-header' + badgeCls + '" href="#" data-nav-idx="' + idx + '" title="' + item.label + '">' +
        svgIcon(item.icon) + '<span class="label">' + item.label + '</span>' + badgeHTML(item.badge) +
        svgIcon('chevron', 'chevron-mini') +
      '</a>' +
      '<div class="nav-sublist">' + childrenHTML(item.children, 1) + '</div>' +
    '</div>';
  }

  function renderNav(){
    var html = NAV_DATA.map(itemHTML).join('');
    document.getElementById('navList').innerHTML = html;
  }

  var flyout = document.getElementById('sidebarFlyout');
  var flyoutCloseTimer = null;

  function hideFlyout(){
    flyout.classList.remove('show');
  }

  function showFlyoutFor(navItemEl, idx){
    clearTimeout(flyoutCloseTimer);
    var item = NAV_DATA[idx];
    var html = '<div class="flyout-header">' + item.label + '</div>';
    if(item.children) html += '<div class="flyout-list">' + childrenHTML(item.children, 1) + '</div>';
    flyout.innerHTML = html;
    var rect = navItemEl.getBoundingClientRect();
    flyout.style.left = (rect.right + 8) + 'px';
    flyout.style.top = Math.max(8, Math.min(rect.top, window.innerHeight - 60)) + 'px';
    flyout.classList.add('show');
  }

  function scheduleHideFlyout(){
    clearTimeout(flyoutCloseTimer);
    flyoutCloseTimer = setTimeout(hideFlyout, 150);
  }

  renderNav();

  var navList = document.getElementById('navList');
  function toggleSubgroup(subgroupToggle){
    var subgroup = subgroupToggle.closest('.nav-subgroup');
    var parentList = subgroup.parentElement;
    var wasOpen = subgroup.classList.contains('open');
    Array.prototype.forEach.call(parentList.children, function(sib){
      if(sib.classList && sib.classList.contains('nav-subgroup')) sib.classList.remove('open');
    });
    if(!wasOpen) subgroup.classList.add('open');
  }

  navList.addEventListener('click', function(e){
    var header = e.target.closest('.group-header');
    if(header){
      e.preventDefault();
      if(sidebar.classList.contains('collapsed')){
        var idx = Number(header.getAttribute('data-nav-idx'));
        if(flyout.classList.contains('show') && flyout.dataset.forIdx === String(idx)){ hideFlyout(); }
        else { flyout.dataset.forIdx = String(idx); showFlyoutFor(header, idx); }
      } else {
        var thisGroup = header.closest('.nav-group');
        var wasOpen = thisGroup.classList.contains('open');
        Array.prototype.slice.call(navList.children).forEach(function(g){
          if(g.classList.contains('nav-group')) g.classList.remove('open');
        });
        if(!wasOpen) thisGroup.classList.add('open');
      }
      return;
    }
    var subgroupToggle = e.target.closest('[data-subgroup-toggle]');
    if(subgroupToggle){
      toggleSubgroup(subgroupToggle);
      return;
    }
    var leaf = e.target.closest('[data-nav-leaf]');
    if(leaf && (!leaf.getAttribute('href') || leaf.getAttribute('href') === '#')){
      e.preventDefault();
    }
  });
  navList.addEventListener('mouseover', function(e){
    if(!sidebar.classList.contains('collapsed')) return;
    var el = e.target.closest('[data-nav-idx]');
    if(!el) return;
    var idx = Number(el.getAttribute('data-nav-idx'));
    if(!NAV_DATA[idx].children) return;
    flyout.dataset.forIdx = String(idx);
    showFlyoutFor(el, idx);
  });
  navList.addEventListener('mouseout', function(e){
    if(!sidebar.classList.contains('collapsed')) return;
    if(e.relatedTarget && flyout.contains(e.relatedTarget)) return;
    scheduleHideFlyout();
  });
  flyout.addEventListener('mouseover', function(){ clearTimeout(flyoutCloseTimer); });
  flyout.addEventListener('mouseout', function(e){
    if(e.relatedTarget && navList.contains(e.relatedTarget)) return;
    scheduleHideFlyout();
  });
  flyout.addEventListener('click', function(e){
    var flyoutSubgroupToggle = e.target.closest('[data-subgroup-toggle]');
    if(flyoutSubgroupToggle){
      toggleSubgroup(flyoutSubgroupToggle);
      return;
    }
    var flyoutLeaf = e.target.closest('[data-nav-leaf]');
    if(flyoutLeaf && (!flyoutLeaf.getAttribute('href') || flyoutLeaf.getAttribute('href') === '#')) e.preventDefault();
  });

  var app = document.getElementById('app');
  var sidebar = document.getElementById('sidebar');

  document.getElementById('sidebarCollapseBtn').addEventListener('click', function(){
    sidebar.classList.toggle('collapsed');
    app.classList.toggle('sidebar-collapsed');
    this.classList.toggle('flipped');
    if(sidebar.classList.contains('collapsed')){
      sidebar.querySelectorAll('.nav-group.open').forEach(function(g){ g.classList.remove('open'); });
      hideFlyout();
    }

  /* User account dropdown */
  var userMenuBtn = document.getElementById('userMenuBtn');
  var userMenu = document.getElementById('userMenu');
  userMenuBtn.addEventListener('click', function(e){
    e.stopPropagation();
    var willOpen = userMenu.hidden;
    userMenu.hidden = !willOpen;
    userMenuBtn.setAttribute('aria-expanded', String(willOpen));
  });
  document.addEventListener('click', function(){
    userMenu.hidden = true;
    userMenuBtn.setAttribute('aria-expanded', 'false');
  });
  userMenu.addEventListener('click', function(e){ e.stopPropagation(); });
  /* ---------------- Custom select dropdowns ---------------- */
  var CLEAR_ICON_SVG = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
  var openPanel = null;

  function closeOpenPanel(){
    if(!openPanel) return;
    openPanel.panel.hidden = true;
    openPanel.wrap.classList.remove('open');
    openPanel = null;
  }

  function syncSelectDisplay(select){
    var wrap = select.closest('.select');
    if(!wrap) return;
    var display = wrap.querySelector('.select-display');
    if(display) display.textContent = select.selectedOptions[0] ? select.selectedOptions[0].textContent : '';
    wrap.classList.toggle('has-value', select.selectedIndex > 0);
    var panel = wrap.querySelector('.select-options-panel');
    if(panel){
      panel.querySelectorAll('.select-option').forEach(function(opt, i){
        opt.classList.toggle('selected', i === select.selectedIndex);
      });
    }
  }

  function enhanceSelects(root){
    (root || document).querySelectorAll('.select').forEach(function(wrap){
      var select = wrap.querySelector('select.field-select');
      if(!select || wrap.querySelector('.select-trigger')) return;

      var trigger = document.createElement('button');
      trigger.type = 'button';
      trigger.className = 'select-trigger';
      var display = document.createElement('span');
      display.className = 'select-display';
      trigger.appendChild(display);
      wrap.insertBefore(trigger, select);

      var clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.className = 'select-clear';
      clearBtn.setAttribute('aria-label', 'Reset selection');
      clearBtn.innerHTML = CLEAR_ICON_SVG;
      var chevron = wrap.querySelector('.chevron');
      wrap.insertBefore(clearBtn, chevron || null);

      var panel = document.createElement('div');
      panel.className = 'select-options-panel';
      panel.hidden = true;
      Array.prototype.forEach.call(select.options, function(opt, i){
        var row = document.createElement('div');
        row.className = 'select-option';
        row.textContent = opt.textContent;
        row.dataset.index = i;
        panel.appendChild(row);
      });
      wrap.appendChild(panel);

      trigger.addEventListener('click', function(e){
        e.stopPropagation();
        if(select.disabled) return;
        if(openPanel && openPanel.panel === panel){ closeOpenPanel(); return; }
        closeOpenPanel();
        panel.hidden = false;
        wrap.classList.add('open');
        openPanel = { panel: panel, wrap: wrap };
      });

      panel.addEventListener('click', function(e){
        e.stopPropagation();
        var row = e.target.closest('.select-option');
        if(!row) return;
        select.selectedIndex = parseInt(row.dataset.index, 10);
        syncSelectDisplay(select);
        closeOpenPanel();
        select.dispatchEvent(new Event('change', { bubbles: true }));
      });

      syncSelectDisplay(select);
    });
  }

  document.addEventListener('click', function(e){
    var clearBtn = e.target.closest('.select-clear');
    if(!clearBtn) return;
    var wrap = clearBtn.closest('.select');
    var select = wrap.querySelector('select.field-select');
    if(select && !select.disabled){
      select.selectedIndex = 0;
      syncSelectDisplay(select);
      select.dispatchEvent(new Event('change', { bubbles: true }));
    }
  });
  document.addEventListener('click', function(){ closeOpenPanel(); });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closeOpenPanel();
  });

  /* ---------------- Shared data-table controller ---------------- */
  function initDataTable(opts){
    var state = { page: 1, pageSize: Number(opts.pageSizeSelect.value), sortKey: opts.defaultSortKey || null, sortDir: opts.defaultSortDir || 1, query: '' };
    if(state.sortKey){
      opts.headerEls.forEach(function(h){
        if(h.getAttribute('data-sort') === state.sortKey) h.classList.add(state.sortDir === 1 ? 'sort-asc' : 'sort-desc');
      });
    }

    function getFiltered(){
      var rows = opts.data.filter(function(item){ return opts.filterFn(item, state.query); });
      if(state.sortKey){
        rows = rows.slice().sort(function(a, b){
          var av = opts.sortValue(a, state.sortKey), bv = opts.sortValue(b, state.sortKey);
          if(av < bv) return -1 * state.sortDir;
          if(av > bv) return 1 * state.sortDir;
          return 0;
        });
      }
      return rows;
    }

    function render(){
      var filtered = getFiltered();
      var total = filtered.length;
      var pages = Math.max(1, Math.ceil(total / state.pageSize));
      if(state.page > pages) state.page = pages;
      var startIdx = (state.page - 1) * state.pageSize;
      var pageRows = filtered.slice(startIdx, startIdx + state.pageSize);
      opts.tbody.innerHTML = pageRows.length
        ? pageRows.map(function(item, i){ return opts.renderRow(item, startIdx + i); }).join('')
        : '<tr class="dt-no-results"><td colspan="' + opts.colCount + '">No results found.</td></tr>';
      opts.pageNumberEl.textContent = state.page;
      opts.pageOfTotalEl.textContent = 'of ' + pages;
      opts.prevBtn.disabled = state.page <= 1;
      opts.nextBtn.disabled = state.page >= pages;
      if(opts.afterRender) opts.afterRender(pageRows);
    }

    if(opts.searchInput){
      opts.searchInput.addEventListener('input', function(){
        state.query = this.value.trim().toLowerCase();
        state.page = 1;
        render();
      });
    }
    opts.pageSizeSelect.addEventListener('change', function(){
      state.pageSize = Number(this.value);
      state.page = 1;
      render();
    });
    opts.prevBtn.addEventListener('click', function(){ if(state.page > 1){ state.page--; render(); } });
    opts.nextBtn.addEventListener('click', function(){ state.page++; render(); });
    opts.headerEls.forEach(function(th){
      th.addEventListener('click', function(){
        var key = th.getAttribute('data-sort');
        if(state.sortKey === key){ state.sortDir *= -1; } else { state.sortKey = key; state.sortDir = 1; }
        opts.headerEls.forEach(function(h){ h.classList.remove('sort-asc', 'sort-desc'); });
        th.classList.add(state.sortDir === 1 ? 'sort-asc' : 'sort-desc');
        render();
      });
    });

    render();
    return { render: render, state: state };
  }

  function sortIconsHTML(){
    return '<span class="dt-sort-icons">' +
      '<svg class="icon up" viewBox="0 0 24 24" fill="currentColor"><path d="M12 6l6 8H6z"/></svg>' +
      '<svg class="icon down" viewBox="0 0 24 24" fill="currentColor"><path d="M12 18l-6-8h12z"/></svg>' +
      '</span>';
  }

  function fmtCurrency(n){
    return '&euro; ' + Number(n).toLocaleString('nl-NL', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  /* ---------------- Quotes data + table ---------------- */
  var QUOTES = [
    { number:'Offerte.998.3149', date:'05-02-2026', reference:'Test', dealer:'UrbanSofa test account' },
    { number:'Offerte.998.3150', date:'15-01-2026', reference:'Oude offerte test', dealer:'UrbanSofa test account' },
    { number:'Offerte.998.3151', date:'10-03-2026', reference:'Fam. Groen bank en fauteuil', dealer:'WoontrendsXL' },
    { number:'Offerte.998.3152', date:'22-04-2026', reference:'Dhr. Mulder eethoek', dealer:'Wooden Planet' },
    { number:'Offerte.998.3153', date:'30-05-2026', reference:'Com: Kantoor inrichting', dealer:'Xander Home' },
    { number:'Offerte.998.3154', date:'05-06-2026', reference:'Mevr. Hendriks slaapkamer', dealer:'Tiger Touch' },

    { number:'Offerte.998.3207', date:'07-07-2026', reference:'Fam. Peters keukenstoelen', dealer:'UrbanSofa test account' },
    { number:'Offerte.998.3208', date:'08-07-2026', reference:'Mevr. Visser bank', dealer:'Wooden Planet' },
    { number:'Offerte.998.3209', date:'09-07-2026', reference:'Dhr en Mevr. Klaassen', dealer:'Tiger Touch' }
  ];

  /* Same generator inputs as detail-view.html, so the total shown here always
     matches the total computed on the quote's own detail page. */
  var PRODUCTS = [
    { price:698, variants:[{ total:null }] },
    { price:548, variants:[{ total:26.25 }, { total:75 }] },
    { price:1240, variants:[{ total:null }] },
    { price:890, variants:[{ total:null }] },
    { price:249, variants:[{ total:null }] },
    { price:765, variants:[{ total:null }, { total:90 }] }
  ];
  function hashIndex(str, mod){
    var h = 0;
    for(var i = 0; i < str.length; i++){ h = (h * 31 + str.charCodeAt(i)) >>> 0; }
    return h % mod;
  }
  function computeQuoteTotal(number){
    var idx = hashIndex(number, 997);
    var itemCount = 1 + (idx % 2);
    var subtotal = 0;
    for(var i = 0; i < itemCount; i++){
      var p = PRODUCTS[(idx + i) % PRODUCTS.length];
      subtotal += p.price;
      p.variants.forEach(function(v){ if(v.total) subtotal += v.total; });
    }
    return subtotal * 1.21;
  }

  function parseDMY(d){
    var parts = d.split('-');
    return new Date(parts[2], parts[1] - 1, parts[0]);
  }
  function remainingInfo(dateStr){
    var quoteDate = parseDMY(dateStr);
    var validUntil = new Date(quoteDate);
    validUntil.setDate(validUntil.getDate() + 30);
    var now = new Date();
    var daysLeft = Math.ceil((validUntil - now) / 86400000);
    if(daysLeft < 0) return { label: 'Expired', cls: 'status-expired' };
    if(daysLeft <= 5) return { label: 'Expiring soon', cls: 'status-expiringsoon' };
    return { label: 'Active', cls: 'status-active' };
  }

  QUOTES.forEach(function(q){
    q.dateSort = parseDMY(q.date).getTime();
    q.total = computeQuoteTotal(q.number);
  });

  var quotesTbody = document.getElementById('quotesBody');
  var appliedDateFrom = null;
  var appliedDateTo = null;

  function quoteRowHTML(q){
    var remaining = remainingInfo(q.date);
    return '<tr>' +
      '<td><a class="dt-link" href="detail-view.html?type=quote&id=' + encodeURIComponent(q.number) + '">' + q.number + '</a></td>' +
      '<td>' + q.date + '</td>' +
      '<td>' + q.reference + '</td>' +
      '<td class="dt-amount">' + fmtCurrency(q.total) + '</td>' +
      '<td><span class="status-badge ' + remaining.cls + '">' + remaining.label + '</span></td>' +
      '<td class="row-actions">' +
        '<button type="button" class="row-action-btn" data-action="assign" title="Assign"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="m17 11 2 2 4-4"/></svg></button>' +
        '<a class="row-action-btn" href="detail-view.html?type=quote&id=' + encodeURIComponent(q.number) + '" title="View ex"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg></a>' +
        '<button type="button" class="row-action-btn" data-action="cancel" data-number="' + q.number + '" title="Cancel"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>' +
      '</td>' +
    '</tr>';
  }

  var quotesDT = initDataTable({
    data: QUOTES,
    colCount: 6,
    tbody: quotesTbody,
    searchInput: document.getElementById('searchInput'),
    pageSizeSelect: document.getElementById('pageSizeSelect'),
    prevBtn: document.getElementById('prevPageBtn'),
    nextBtn: document.getElementById('nextPageBtn'),
    pageNumberEl: document.getElementById('pageNumberBubble'),
    pageOfTotalEl: document.getElementById('pageOfTotal'),
    headerEls: Array.prototype.slice.call(document.querySelectorAll('#quotesTable thead th.sortable')),
    filterFn: function(q, query){
      if(appliedDateFrom && q.dateSort < appliedDateFrom.getTime()) return false;
      if(appliedDateTo && q.dateSort > appliedDateTo.getTime()) return false;
      if(query && (q.number + ' ' + q.reference + ' ' + q.dealer + ' ' + q.date).toLowerCase().indexOf(query) === -1) return false;
      return true;
    },
    sortValue: function(q, key){
      if(key === 'total' || key === 'dateSort') return q[key];
      if(key === 'remaining') return remainingInfo(q.date).label;
      return String(q[key]).toLowerCase();
    },
    renderRow: function(q){ return quoteRowHTML(q); },
    afterRender: function(){
      Array.prototype.slice.call(quotesTbody.querySelectorAll('[data-action="assign"]')).forEach(function(btn){
        btn.addEventListener('click', function(){ window.alert('Assigned to Bugloos Team.'); });
      });
      Array.prototype.slice.call(quotesTbody.querySelectorAll('[data-action="cancel"]')).forEach(function(btn){
        btn.addEventListener('click', function(){
          var number = btn.getAttribute('data-number');
          if(window.confirm('Cancel quote ' + number + '?')){
            var q = QUOTES.filter(function(x){ return x.number === number; })[0];
            if(q){
              var i = QUOTES.indexOf(q);
              QUOTES.splice(i, 1);
              quotesDT.render();
            }
          }
        });
      });
    }
  });

  /* Search: collapse/expand toggle (same component as Orders overview) */
  var searchToggle = document.getElementById('searchToggle');
  var searchToggleBtn = document.getElementById('searchToggleBtn');
  var searchInputEl = document.getElementById('searchInput');
  searchToggleBtn.addEventListener('click', function(e){
    e.stopPropagation();
    if(!searchToggle.classList.contains('expanded')){
      searchToggle.classList.add('expanded');
      searchInputEl.focus();
    } else if(!searchInputEl.value){
      searchToggle.classList.remove('expanded');
    }
  });
  document.addEventListener('click', function(e){
    if(!searchToggle.contains(e.target) && !searchInputEl.value){
      searchToggle.classList.remove('expanded');
    }
  });

  /* ---------------- Date range picker (same component as Orders overview) ---------------- */
  var MONTH_LABELS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function dOnly(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function addDays(d, n){ var r = new Date(d); r.setDate(r.getDate() + n); return r; }
  function fmtChip(d){ return d.getDate() + ' ' + MONTH_LABELS[d.getMonth()].slice(0,3); }
  function sameDay(a, b){ return a && b && a.getTime() === b.getTime(); }

  var today = dOnly(new Date());
  var drp = {
    viewMonth: new Date(today.getFullYear(), today.getMonth(), 1),
    start: null,
    end: null
  };

  var dateRangeBtn = document.getElementById('dateRangeBtn');
  var dateRangePopover = document.getElementById('dateRangePopover');
  var drpDaysGrid = document.getElementById('drpDaysGrid');
  var drpMonthLabel = document.getElementById('drpMonthLabel');
  var drpRangeLabel = document.getElementById('drpRangeLabel');
  var dateRangeChip = document.getElementById('dateRangeChip');
  var dateRangeChipText = document.getElementById('dateRangeChipText');

  function renderCalendar(){
    drpMonthLabel.textContent = MONTH_LABELS[drp.viewMonth.getMonth()] + ' ' + drp.viewMonth.getFullYear();
    drpDaysGrid.innerHTML = '';

    var firstOfMonth = new Date(drp.viewMonth.getFullYear(), drp.viewMonth.getMonth(), 1);
    var startOffset = (firstOfMonth.getDay() + 6) % 7;
    var gridStart = addDays(firstOfMonth, -startOffset);

    for(var i = 0; i < 42; i++){
      var day = addDays(gridStart, i);
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'drp-day';
      btn.textContent = day.getDate();
      if(day.getMonth() !== drp.viewMonth.getMonth()) btn.classList.add('other-month');
      if(sameDay(day, today)) btn.classList.add('today');
      if(drp.start && sameDay(day, drp.start)) btn.classList.add('range-start');
      if(drp.end && sameDay(day, drp.end)) btn.classList.add('range-end');
      if(drp.start && drp.end && day > drp.start && day < drp.end) btn.classList.add('in-range');
      btn.addEventListener('click', function(day){
        return function(){
          if(!drp.start || (drp.start && drp.end)){
            drp.start = day; drp.end = null;
          } else if(day < drp.start){
            drp.end = drp.start; drp.start = day;
          } else {
            drp.end = day;
          }
          renderCalendar();
          drpRangeLabel.textContent = drp.start && drp.end
            ? (fmtChip(drp.start) + ' – ' + fmtChip(drp.end))
            : (drp.start ? 'Select an end date' : 'Select a start date');
        };
      }(day));
      drpDaysGrid.appendChild(btn);
    }
  }

  function setRange(start, end, viewMonth){
    drp.start = dOnly(start);
    drp.end = dOnly(end);
    drp.viewMonth = viewMonth ? new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1) : new Date(drp.start.getFullYear(), drp.start.getMonth(), 1);
    renderCalendar();
    drpRangeLabel.textContent = fmtChip(drp.start) + ' – ' + fmtChip(drp.end);
  }

  document.getElementById('drpPrevMonth').addEventListener('click', function(){
    drp.viewMonth = new Date(drp.viewMonth.getFullYear(), drp.viewMonth.getMonth() - 1, 1);
    renderCalendar();
  });
  document.getElementById('drpNextMonth').addEventListener('click', function(){
    drp.viewMonth = new Date(drp.viewMonth.getFullYear(), drp.viewMonth.getMonth() + 1, 1);
    renderCalendar();
  });

  document.querySelectorAll('.drp-presets button').forEach(function(btn){
    btn.addEventListener('click', function(){
      var preset = btn.dataset.preset;
      if(preset === 'today'){
        setRange(today, today);
      } else if(preset === 'last7'){
        setRange(addDays(today, -6), today);
      } else if(preset === 'lastWeek'){
        var mondayThisWeek = addDays(today, -((today.getDay() + 6) % 7));
        var mondayLastWeek = addDays(mondayThisWeek, -7);
        setRange(mondayLastWeek, addDays(mondayLastWeek, 6));
      } else if(preset === 'thisMonth'){
        var firstThis = new Date(today.getFullYear(), today.getMonth(), 1);
        setRange(firstThis, today, firstThis);
      } else if(preset === 'lastMonth'){
        var firstLast = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        var lastLast = new Date(today.getFullYear(), today.getMonth(), 0);
        setRange(firstLast, lastLast, firstLast);
      } else if(preset === 'lastQuarter'){
        var qStartMonth = Math.floor(today.getMonth() / 3) * 3 - 3;
        var qStart = new Date(today.getFullYear(), qStartMonth, 1);
        var qEnd = new Date(today.getFullYear(), qStartMonth + 3, 0);
        setRange(qStart, qEnd, qStart);
      }
    });
  });

  dateRangeBtn.addEventListener('click', function(e){
    e.stopPropagation();
    var willOpen = dateRangePopover.hidden;
    dateRangePopover.hidden = !willOpen;
    if(willOpen){
      if(appliedDateFrom && appliedDateTo){
        drp.start = appliedDateFrom; drp.end = appliedDateTo; drp.viewMonth = new Date(drp.start.getFullYear(), drp.start.getMonth(), 1);
      } else {
        drp.start = null; drp.end = null; drp.viewMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      }
      renderCalendar();
      drpRangeLabel.textContent = drp.start && drp.end ? (fmtChip(drp.start) + ' – ' + fmtChip(drp.end)) : 'Select a start date';
    }
  });
  dateRangePopover.addEventListener('click', function(e){ e.stopPropagation(); });
  document.addEventListener('click', function(){ dateRangePopover.hidden = true; });

  document.getElementById('drpCancelBtn').addEventListener('click', function(){
    dateRangePopover.hidden = true;
  });
  document.getElementById('drpApplyBtn').addEventListener('click', function(){
    if(drp.start && drp.end){
      appliedDateFrom = drp.start;
      appliedDateTo = drp.end;
      dateRangeChipText.textContent = fmtChip(drp.start) + ' – ' + fmtChip(drp.end);
      dateRangeChip.classList.add('visible');
      dateRangeBtn.classList.add('has-range');
    } else {
      appliedDateFrom = null;
      appliedDateTo = null;
      dateRangeChip.classList.remove('visible');
      dateRangeBtn.classList.remove('has-range');
    }
    dateRangePopover.hidden = true;
    quotesDT.state.page = 1;
    quotesDT.render();
  });
  document.getElementById('dateRangeClearBtn').addEventListener('click', function(e){
    e.stopPropagation();
    appliedDateFrom = null;
    appliedDateTo = null;
    drp.start = null; drp.end = null;
    dateRangeChip.classList.remove('visible');
    dateRangeBtn.classList.remove('has-range');
    quotesDT.state.page = 1;
    quotesDT.render();
  });

  enhanceSelects();
})();
</script>
